# ralph.yml — Configuration for the Ralph autonomous agent harness
# These values override flow-next config.yml defaults for autonomous runs.

agent:
  max_cycles: 50            # Max iterations before stopping
  cooldown_seconds: 5       # Pause between cycles (rate limiting)
  revert_on_failure: true   # Revert changes if quality checks fail
  stop_on_empty: true       # Stop if agent produces no changes

quality:
  build_command: "dotnet pack src/Humanizer/Humanizer.csproj -c Release -o artifacts"
  test_command: "dotnet test tests/Humanizer.Tests/Humanizer.Tests.csproj --framework net10.0"
  require_build: true
  require_tests: true

git:
  auto_commit: true
  commit_prefix: "feat"     # Prefix for autonomous commits
  branch_strategy: "current" # current | worktree
