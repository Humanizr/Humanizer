# Locale-owned generator data for hy.
# Omit a feature to inherit it from the parent locale.
# Inline mappings below are the source of truth for generated profiles and token-map lexicons.
collectionFormatter:
  engine: 'conjunction'
  value: 'և'
formatter:
  engine: 'profiled'
  dataUnitFallbackTransform: 'trim-trailing-s'
numberToWords:
  engine: 'joined-scale'
  maximumValue: 9223372036854775807
  zeroWord: 'զրո'
  minusWord: 'մինուս'
  negativeJoinWord: ' '
  joinWord: ' '
  scaleCountJoinWord: ' '
  underHundredJoinWord: ''
  omitOneWhenSingularAlways: true
  defaultOrdinalSuffix: 'երորդ'
  matchingOrdinalSuffix: null
  ordinalSuffixMatchCharacters: null
  unitsMap:
    - 'զրո'
    - 'մեկ'
    - 'երկու'
    - 'երեք'
    - 'չորս'
    - 'հինգ'
    - 'վեց'
    - 'յոթ'
    - 'ութ'
    - 'ինը'
    - 'տաս'
    - 'տասնմեկ'
    - 'տասներկու'
    - 'տասներեք'
    - 'տասնչորս'
    - 'տասնհինգ'
    - 'տասնվեց'
    - 'տասնյոթ'
    - 'տասնութ'
    - 'տասնինը'
  tensMap:
    - 'զրո'
    - 'տաս'
    - 'քսան'
    - 'երեսուն'
    - 'քառասուն'
    - 'հիսուն'
    - 'վաթսուն'
    - 'յոթանասուն'
    - 'ութսուն'
    - 'իննսուն'
  hundredsMap: []
  scales:
    -
      value: 1000000000000000000
      name: 'քվինտիլիոն'
    -
      value: 1000000000000000
      name: 'կվադրիլիոն'
    -
      value: 1000000000000
      name: 'տրիլիոն'
    -
      value: 1000000000
      name: 'միլիարդ'
    -
      value: 1000000
      name: 'միլիոն'
    -
      value: 1000
      name: 'հազար'
      omitOneWhenSingular: true
    -
      value: 100
      name: 'հարյուր'
      omitOneWhenSingular: true
  ordinalExceptions:
    '0': 'զրոյական'
    '1': 'առաջին'
    '2': 'երկրորդ'
    '3': 'երրորդ'
    '4': 'չորրորդ'
ordinalizer:
  engine: 'modulo-suffix'
  defaultSuffix: '-րդ'
  useAbsoluteValue: true
  exactSuffixes:
    '1': '-ին'
wordsToNumber:
  engine: 'token-map'
  normalizationProfile: 'CollapseWhitespace'
  cardinalMap:
    'զրո': 0
    'մեկ': 1
    'երկու': 2
    'երեք': 3
    'չորս': 4
    'հինգ': 5
