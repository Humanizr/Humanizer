        1: 'fyrst'
        3: 'þriðj'
        4: 'fjórð'
        5: 'fimmt'
        6: 'sjött'
        7: 'sjöund'
        8: 'áttund'
        9: 'níund'
        10: 'tíund'
        11: 'elleft'
        12: 'tólft'
        13: 'þrettánd'
        14: 'fjórtánd'
        15: 'fimmtánd'
        16: 'sextánd'
        17: 'sautjánd'
        18: 'átjánd'
        19: 'nítjánd'
      tensOrdinalPrefixes:
        1: 'tíund'
        2: 'tuttugast'
        3: 'þrítugast'
        4: 'fertugast'
        5: 'fimmtugast'
        6: 'sextugast'
        7: 'sjötugast'
        8: 'áttugast'
        9: 'nítugast'
      hundredSingular: 'hundrað'
      hundredPlural: 'hundruð'
      ordinalTwoMasculine: 'annar'
      ordinalTwoFeminine: 'önnur'
      ordinalTwoNeuter: 'annað'
      scales:
        -
          value: 1000000000000000000
          singular: 'ein trilljón'
          plural: 'trilljónir'
          ordinalPrefix: 'trilljónast'
          gender: 'feminine'
        -
          value: 1000000000000000
          singular: 'einn billjarður'
          plural: 'billjarðar'
          ordinalPrefix: 'billjarðast'
          gender: 'masculine'
        -
          value: 1000000000000
          singular: 'ein billjón'
          plural: 'billjónir'
          ordinalPrefix: 'billjónast'
          gender: 'feminine'
        -
          value: 1000000000
          singular: 'einn milljarður'
          plural: 'milljarðar'
          ordinalPrefix: 'milljarðast'
          gender: 'masculine'
        -
          value: 1000000
          singular: 'ein milljón'
          plural: 'milljónir'
          ordinalPrefix: 'milljónast'
          gender: 'feminine'
        -
          value: 1000
          singular: 'eitt þúsund'
          plural: 'þúsund'
          ordinalPrefix: 'þúsundast'
          gender: 'neuter'

    parse:
      engine: 'compound-scale'
      cardinalMap:
