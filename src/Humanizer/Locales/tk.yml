      - 'demirgazyk-demirgazyk-gündogar'
      - 'demirgazyk-gündogar'
      - 'gündogar-demirgazyk-gündogar'
      - 'gündogar'
      - 'gündogar-günorta-gündogar'
      - 'günorta-gündogar'
      - 'günorta-günorta-gündogar'
      - 'günorta'
      - 'günorta-günorta-günbatar'
      - 'günorta-günbatar'
      - 'günbatar-günorta-günbatar'
      - 'günbatar'
      - 'günbatar-demirgazyk-günbatar'
      - 'demirgazyk-günbatar'
      - 'demirgazyk-demirgazyk-günbatar'
    short:
      - 'D'
      - 'DDGd'
      - 'DGd'
      - 'GdDGd'
      - 'Gd'
      - 'GdGGd'
      - 'GGd'
      - 'GGGd'
      - 'G'
      - 'GGGb'
      - 'GGb'
      - 'GbGGb'
      - 'Gb'
      - 'GbDGb'
      - 'DGb'
      - 'DDGb'

  calendar:
