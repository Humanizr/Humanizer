locale: 'ru'

surfaces:
  list:
    engine: 'conjunction'
    value: 'и'

  formatter:
    engine: 'profiled'
    dataUnitFallbackTransform: 'trim-trailing-s'
    pluralRule: 'russian'
    timeUnitGenders:
      millisecond: 'feminine'
      second: 'feminine'
      minute: 'feminine'
      hour: 'masculine'
      day: 'masculine'
      week: 'feminine'
      month: 'masculine'
      year: 'masculine'

  phrases:
    relativeDate:
      now: 'сейчас'
      never: 'никогда'
      past:
        millisecond:
          single: 'миллисекунду назад'
          multiple:
            forms: 'миллисекунд'
            afterCount: 'назад'
        second:
          single: 'секунду назад'
          multiple:
            forms:
              default: 'секунд'
              singular: 'секунду'
              dual: 'секунды'
            afterCount: 'назад'
        minute:
          single: 'минуту назад'
          multiple:
            forms:
              default: 'минут'
              singular: 'минуту'
              dual: 'минуты'
            afterCount: 'назад'
        hour:
          single: 'час назад'
          multiple:
            forms:
              default: 'часов'
              singular: 'час'
              dual: 'часа'
            afterCount: 'назад'
        day:
          single: 'вчера'
          template:
            name: 'two'
            value: 'два дня назад'
          multiple:
            forms:
              default: 'дней'
              singular: 'день'
              dual: 'дня'
            afterCount: 'назад'
        week:
          single: 'неделю назад'
          multiple:
            forms: 'недель'
            afterCount: 'назад'
        month:
          single: 'месяц назад'
          multiple:
            forms:
              default: 'месяцев'
              singular: 'месяц'
              dual: 'месяца'
            afterCount: 'назад'
        year:
          single: 'год назад'
          multiple:
            forms:
              default: 'лет'
              singular: 'год'
              dual: 'года'
            afterCount: 'назад'
      future:
        millisecond:
          single: 'через миллисекунду'
          multiple:
            forms: 'миллисекунд'
            beforeCount: 'через'
        second:
          single: 'через секунду'
          multiple:
            forms:
              default: 'секунд'
              singular: 'секунду'
              dual: 'секунды'
            beforeCount: 'через'
        minute:
          single: 'через минуту'
          multiple:
            forms:
              default: 'минут'
              singular: 'минуту'
              dual: 'минуты'
            beforeCount: 'через'
        hour:
          single: 'через час'
          multiple:
            forms:
              default: 'часов'
              singular: 'час'
              dual: 'часа'
            beforeCount: 'через'
        day:
          single: 'завтра'
          template:
            name: 'two'
            value: 'через два дня'
          multiple:
            forms:
              default: 'дней'
              singular: 'день'
              dual: 'дня'
            beforeCount: 'через'
        week:
          single: 'через неделю'
          multiple:
            forms: 'недель'
            beforeCount: 'через'
        month:
          single: 'через месяц'
          multiple:
            forms:
              default: 'месяцев'
              singular: 'месяц'
              dual: 'месяца'
            beforeCount: 'через'
        year:
          single: 'через год'
          multiple:
            forms:
              default: 'лет'
              singular: 'год'
              dual: 'года'
            beforeCount: 'через'
    duration:
      zero: 'нет времени'
      age:
        template: '{value}'
      millisecond:
        single:
          numeric: '1 миллисекунда'
          words: 'одна миллисекунда'
