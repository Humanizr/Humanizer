# Locale-owned generator data for pt-BR.
# Omit a feature to inherit it from the parent locale.
# Inline mappings below are the source of truth for generated profiles and token-map lexicons.
inherits: 'pt'
numberToWords:
  engine: 'billion-strategy'
  minusWord: 'menos'
  andWord: 'e'
  cardinal:
    hundredExactWord: 'cem'
    thousandWord: 'mil'
    millionSingularWord: 'milhão'
    millionPluralWord: 'milhões'
    billionStrategy: 'billion-word'
    billionSingularWord: 'bilhão'
    billionPluralWord: 'bilhões'
    unitsMap:
      - 'zero'
      - 'um'
      - 'dois'
      - 'três'
      - 'quatro'
      - 'cinco'
      - 'seis'
      - 'sete'
      - 'oito'
      - 'nove'
      - 'dez'
      - 'onze'
      - 'doze'
      - 'treze'
      - 'quatorze'
      - 'quinze'
      - 'dezesseis'
      - 'dezessete'
      - 'dezoito'
      - 'dezenove'
    tensMap:
      - 'zero'
      - 'dez'
      - 'vinte'
      - 'trinta'
      - 'quarenta'
      - 'cinquenta'
      - 'sessenta'
      - 'setenta'
      - 'oitenta'
      - 'noventa'
    hundredsMap:
      - 'zero'
      - 'cento'
      - 'duzentos'
      - 'trezentos'
      - 'quatrocentos'
      - 'quinhentos'
      - 'seiscentos'
      - 'setecentos'
      - 'oitocentos'
      - 'novecentos'
  ordinal:
    billionStrategy: 'billion-word'
    thousandWord: 'milésimo'
    millionWord: 'milionésimo'
    billionWord: 'bilionésimo'
    millionSeparator: ''
    unitsMap:
      - 'zero'
      - 'primeiro'
      - 'segundo'
      - 'terceiro'
      - 'quarto'
      - 'quinto'
      - 'sexto'
      - 'sétimo'
      - 'oitavo'
      - 'nono'
    tensMap:
      - 'zero'
      - 'décimo'
      - 'vigésimo'
      - 'trigésimo'
      - 'quadragésimo'
      - 'quinquagésimo'
      - 'sexagésimo'
      - 'septuagésimo'
      - 'octogésimo'
      - 'nonagésimo'
    hundredsMap:
      - 'zero'
      - 'centésimo'
      - 'ducentésimo'
      - 'trecentésimo'
      - 'quadringentésimo'
      - 'quingentésimo'
      - 'sexcentésimo'
      - 'septingentésimo'
      - 'octingentésimo'
      - 'noningentésimo'
dateToOrdinalWords:
  pattern: '{day} ''de'' MMMM ''de'' yyyy'
  dayMode: 'MasculineOrdinalWhenDayIsOne'
dateOnlyToOrdinalWords:
  pattern: '{day} ''de'' MMMM ''de'' yyyy'
  dayMode: 'MasculineOrdinalWhenDayIsOne'
timeOnlyToClockNotation:
  engine: 'phrase-hour'
  midnight: 'meia-noite'
  midday: 'meio-dia'
  oclockFormat: '{0} em ponto'
  quarterPastFormat: '{0} e quinze'
  halfPastFormat: '{0} e meia'
  twentyToFormat: 'vinte para as {0}'
  quarterToFormat: 'quinze para as {0}'
  tenToFormat: 'dez para as {0}'
  fiveToFormat: 'cinco para as {0}'
  roundHourFormat: '{0} em ponto'
  genericMinutesFormat: '{0} e {1}'
