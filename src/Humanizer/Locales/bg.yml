# Locale-owned generator data for bg.
# Omit a feature to inherit it from the parent locale.
# Inline mappings below are the source of truth for generated profiles and token-map lexicons.
collectionFormatter:
  engine: 'conjunction'
  value: 'и'
formatter:
  engine: 'profiled'
  dataUnitDetector: 'singular-plural'
  dataUnitSuffixes:
    singular: '_Singular'
    plural: '_Plural'
  dataUnitFallbackTransform: 'trim-trailing-s'
  timeUnitGenders:
    millisecond: 'feminine'
    second: 'feminine'
    minute: 'feminine'
    hour: 'masculine'
    day: 'masculine'
    week: 'feminine'
    month: 'masculine'
    year: 'feminine'
numberToWords:
