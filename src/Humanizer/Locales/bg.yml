    - 'петстотин'
    - 'шестстотин'
    - 'седемстотин'
    - 'осемстотин'
    - 'деветстотин'
  hundredsOrdinalMap:
    1: 'стот'
    2: 'двестот'
    3: 'тристот'
    4: 'четиристот'
    5: 'петстот'
    6: 'шестстот'
    7: 'седемстот'
    8: 'осемстот'
    9: 'деветстот'
