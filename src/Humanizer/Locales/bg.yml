    17: 'седемнадесет'
    18: 'осемнадесет'
    19: 'деветнадесет'
  scales:
    -
      divisor: 1000000000000000000
      gender: 'masculine'
      singular: 'квинтилион'
      plural: 'квадрилиона'
      ordinalStem: 'квинтилион'
    -
      divisor: 1000000000000000
      gender: 'masculine'
      singular: 'квадрилион'
      plural: 'квадрилиона'
      ordinalStem: 'квадрилион'
    -
      divisor: 1000000000000
      gender: 'masculine'
      singular: 'трилион'
