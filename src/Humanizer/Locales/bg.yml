    1: 'първ'
    2: 'втор'
    3: 'трет'
    4: 'четвърт'
    5: 'пет'
    6: 'шест'
    7: 'седм'
    8: 'осм'
    9: 'девeт'
    10: 'десeт'
    11: 'единадесет'
