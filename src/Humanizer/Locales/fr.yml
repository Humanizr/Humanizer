# Locale-owned generator data for fr.
# Omit a feature to inherit it from the parent locale.
# Inline mappings below are the source of truth for generated profiles and token-map lexicons.
collectionFormatter:
  engine: 'conjunction'
  value: 'et'
formatter:
  engine: 'profiled'
  exactDateForms:
    -
      number: 2
      form: 'dual'
      units:
        - 'day'
      tenses:
        - 'past'
        - 'future'
  exactTimeSpanForms:
    -
      number: 0
      form: 'singular'
numberToWords:
  engine: 'variant-decade'
  minusWord: 'moins'
  seventyStrategy: 'sixty-plus-teens'
  ninetyStrategy: 'eighty-plus-teens'
  specialSeventyOneEnabled: true
  specialSeventyOneWord: 'soixante et onze'
  pluralizeExactEighty: true
  tensUsingEtWhenUnitIsOne:
    - 2
    - 3
    - 4
    - 5
    - 6
  tensMap:
    - 'zéro'
    - 'dix'
    - 'vingt'
    - 'trente'
    - 'quarante'
    - 'cinquante'
    - 'soixante'
    - 'soixante'
    - 'quatre-vingt'
    - 'quatre-vingt'
ordinalizer:
  engine: 'template'
  masculine:
    defaultSuffix: 'ème'
    exactSuffixes:
      1: 'er'
  feminine:
    defaultSuffix: 'ème'
    exactSuffixes:
      1: 'ère'
  neuter:
    defaultSuffix: 'ème'
    exactSuffixes:
      1: 'er'
dateToOrdinalWords:
  pattern: '{day} MMMM yyyy'
  dayMode: 'OrdinalWhenDayIsOne'
dateOnlyToOrdinalWords:
  pattern: '{day} MMMM yyyy'
  dayMode: 'OrdinalWhenDayIsOne'
timeOnlyToClockNotation:
  engine: 'french'
wordsToNumber:
  engine: 'vigesimal-compound'
  cardinalMap:
    'zéro': 0
    un: 1
    une: 1
    deux: 2
    trois: 3
    quatre: 4
    cinq: 5
    six: 6
    sept: 7
    huit: 8
    neuf: 9
    dix: 10
    onze: 11
    douze: 12
    treize: 13
    quatorze: 14
    quinze: 15
    seize: 16
    vingt: 20
    trente: 30
    quarante: 40
    cinquante: 50
    soixante: 60
    cent: 100
    cents: 100
    mille: 1000
    million: 1000000
    millions: 1000000
    milliard: 1000000000
    milliards: 1000000000
  ordinalMap:
    premier: 1
    'première': 1
  negativePrefixes:
    - 'moins '
  ignoredTokens:
    - 'et'
  vigesimalLeadingToken: 'quatre'
  vigesimalFollowerTokens:
    - 'vingt'
    - 'vingts'
  vigesimalValue: 80
  teenLeaderToken: 'dix'
  teenLeaderBases:
    - 60
    - 80

phrases:
  dateHumanize:
    now: 'maintenant'
    never: 'jamais'
    past:
      millisecond:
        single: 'il y a une milliseconde'
        multiple:
          forms:
            default: 'millisecondes'
          beforeCount: 'il y a'
      second:
        single: 'il y a une seconde'
        multiple:
          forms:
            default: 'secondes'
          beforeCount: 'il y a'
      minute:
        single: 'il y a une minute'
        multiple:
          forms:
            default: 'minutes'
          beforeCount: 'il y a'
      hour:
        single: 'il y a une heure'
        multiple:
          forms:
            default: 'heures'
          beforeCount: 'il y a'
      day:
        single: 'hier'
        multiple:
          countPlacement: none
          forms:
            default: 'il y a {count} jours'
            singular: 'avant-hier'
            dual: 'avant-hier'
            plural: 'avant-hier'
        template:
          name: 'two'
          value: 'avant-hier'
      week:
        single: 'il y a une semaine'
        multiple:
          forms:
            default: 'semaines'
          beforeCount: 'il y a'
      month:
        single: 'il y a un mois'
        multiple:
          forms:
            default: 'mois'
          beforeCount: 'il y a'
      year:
        single: 'il y a un an'
        multiple:
          forms:
            default: 'ans'
          beforeCount: 'il y a'
    future:
