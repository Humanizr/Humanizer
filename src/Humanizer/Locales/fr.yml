        single: 'dans une milliseconde'
        multiple:
          forms:
            default: 'millisecondes'
          beforeCount: 'dans'
      second:
        single: 'dans une seconde'
        multiple:
          forms:
            default: 'secondes'
          beforeCount: 'dans'
      minute:
        single: 'dans une minute'
        multiple:
          forms:
            default: 'minutes'
          beforeCount: 'dans'
      hour:
        single: 'dans une heure'
        multiple:
          forms:
            default: 'heures'
          beforeCount: 'dans'
      day:
        single: 'demain'
        multiple:
          countPlacement: none
          forms:
            default: 'dans {count} jours'
            singular: 'après-demain'
            dual: 'après-demain'
            plural: 'après-demain'
        template:
          name: 'two'
