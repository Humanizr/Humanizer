locale: 'te'

surfaces:
  list:
    engine: 'conjunction'
    value: 'మరియు'

  formatter:
    engine: 'profiled'
    pluralRule: 'singular-plural'
    dataUnitPluralRule: 'singular-plural'
    dataUnitFallbackTransform: 'trim-trailing-s'

  phrases:
    relativeDate:
      now: 'ఇప్పుడే'
      never: 'ఎప్పుడూ లేదు'
      past:
        millisecond:
          single: 'ఒక మిల్లీసెకను క్రితం'
          multiple:
            forms:
              default: 'మిల్లీసెకన్లు'
            afterCount: 'క్రితం'
        second:
          single: 'ఒక సెకను క్రితం'
          multiple:
            forms:
              default: 'సెకన్లు'
            afterCount: 'క్రితం'
        minute:
          single: 'ఒక నిమిషం క్రితం'
          multiple:
            forms:
              default: 'నిమిషాలు'
            afterCount: 'క్రితం'
        hour:
          single: 'ఒక గంట క్రితం'
          multiple:
            forms:
              default: 'గంటలు'
            afterCount: 'క్రితం'
        day:
          single: 'నిన్న'
          multiple:
            forms:
              default: 'రోజులు'
            afterCount: 'క్రితం'
        week:
          single: 'ఒక వారం క్రితం'
          multiple:
            forms:
              default: 'వారాలు'
            afterCount: 'క్రితం'
        month:
          single: 'ఒక నెల క్రితం'
          multiple:
            forms:
              default: 'నెలలు'
            afterCount: 'క్రితం'
        year:
          single: 'ఒక సంవత్సరం క్రితం'
          multiple:
            forms:
              default: 'సంవత్సరాలు'
            afterCount: 'క్రితం'
      future:
        millisecond:
          single: 'ఒక మిల్లీసెకను తర్వాత'
          multiple:
            forms:
              default: 'మిల్లీసెకన్లు'
            afterCount: 'తర్వాత'
        second:
          single: 'ఒక సెకను తర్వాత'
          multiple:
            forms:
              default: 'సెకన్లు'
            afterCount: 'తర్వాత'
        minute:
          single: 'ఒక నిమిషం తర్వాత'
          multiple:
            forms:
              default: 'నిమిషాలు'
            afterCount: 'తర్వాత'
        hour:
          single: 'ఒక గంట తర్వాత'
          multiple:
            forms:
              default: 'గంటలు'
            afterCount: 'తర్వాత'
        day:
          single: 'రేపు'
          multiple:
            forms:
              default: 'రోజులు'
            afterCount: 'తర్వాత'
        week:
          single: 'ఒక వారం తర్వాత'
          multiple:
            forms:
              default: 'వారాలు'
            afterCount: 'తర్వాత'
        month:
          single: 'ఒక నెల తర్వాత'
          multiple:
            forms:
              default: 'నెలలు'
            afterCount: 'తర్వాత'
        year:
          single: 'ఒక సంవత్సరం తర్వాత'
          multiple:
            forms:
              default: 'సంవత్సరాలు'
            afterCount: 'తర్వాత'
    duration:
      zero: 'సమయం లేదు'
      age:
        template: '{value} వయస్సు'
      millisecond:
        single:
          numeric: '1 మిల్లీసెకను'
          words: 'ఒక మిల్లీసెకను'
        multiple:
          forms:
            default: 'మిల్లీసెకన్లు'
            singular: 'మిల్లీసెకను'
      second:
        single:
          numeric: '1 సెకను'
          words: 'ఒక సెకను'
        multiple:
          forms:
            default: 'సెకన్లు'
            singular: 'సెకను'
      minute:
        single:
          numeric: '1 నిమిషం'
          words: 'ఒక నిమిషం'
        multiple:
          forms:
            default: 'నిమిషాలు'
            singular: 'నిమిషం'
      hour:
        single:
          numeric: '1 గంట'
          words: 'ఒక గంట'
        multiple:
          forms:
            default: 'గంటలు'
            singular: 'గంట'
      day:
        single:
          numeric: '1 రోజు'
          words: 'ఒక రోజు'
        multiple:
          forms:
            default: 'రోజులు'
            singular: 'రోజు'
      week:
        single:
          numeric: '1 వారం'
          words: 'ఒక వారం'
        multiple:
          forms:
            default: 'వారాలు'
            singular: 'వారం'
      month:
        single:
          numeric: '1 నెల'
          words: 'ఒక నెల'
        multiple:
          forms:
            default: 'నెలలు'
            singular: 'నెల'
      year:
        single:
          numeric: '1 సంవత్సరం'
          words: 'ఒక సంవత్సరం'
        multiple:
          forms:
            default: 'సంవత్సరాలు'
            singular: 'సంవత్సరం'
    dataUnits:
      bit:
        forms:
          default: 'బిట్‌లు'
          singular: 'బిట్'
        symbol: 'b'
      byte:
        forms:
          default: 'బైట్లు'
          singular: 'బైట్'
        symbol: 'B'
      kilobyte:
        forms:
          default: 'కిలోబైట్లు'
          singular: 'కిలోబైట్'
        symbol: 'KB'
      megabyte:
        forms:
          default: 'మెగాబైట్లు'
          singular: 'మెగాబైట్'
        symbol: 'MB'
      gigabyte:
        forms:
          default: 'గిగాబైట్లు'
          singular: 'గిగాబైట్'
        symbol: 'GB'
      terabyte:
        forms:
          default: 'టెరాబైట్లు'
          singular: 'టెరాబైట్'
        symbol: 'TB'
    timeUnits:
      millisecond:
        symbol: 'మిల్లీసెకను'
      second:
        symbol: 'సెకను'
      minute:
        symbol: 'నిమిషం'
      hour:
        symbol: 'గంట'
      day:
        symbol: 'రోజు'
      week:
        symbol: 'వారం'
      month:
        symbol: 'నెల'
      year:
        symbol: 'సంవత్సరం'

  number:
    # number.words and number.parse remain blocked pending a separately assigned
    # Telugu-capable shared number strategy.
    formatting:
      decimalSeparator: '.'
      groupSeparator: ','
      negativeSign: '-'

  ordinal:
    numeric:
      engine: 'template'
      masculine:
        defaultSuffix: 'వ'
    date:
      pattern: '{day} MMMM yyyy'
      dayMode: 'Numeric'
    dateOnly:
      pattern: '{day} MMMM yyyy'
      dayMode: 'Numeric'

  clock:
    engine: 'phrase-clock'
    hourMode: 'h12'
    dayPeriodPosition: 'prefix'
    hourWordsMap:
      - ''
      - 'ఒంటి గంట'
      - 'రెండు గంటలు'
      - 'మూడు గంటలు'
      - 'నాలుగు గంటలు'
      - 'ఐదు గంటలు'
      - 'ఆరు గంటలు'
      - 'ఏడు గంటలు'
