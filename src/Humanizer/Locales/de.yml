locale: 'de'

surfaces:
  list:
    engine: 'conjunction'
    value: 'und'

  formatter:
    engine: 'profiled'
    dataUnitFallbackTransform: 'trim-trailing-s'

  phrases:
    relativeDate:
      now: 'jetzt'
      never: 'nie'
      past:
        millisecond:
          single: 'vor einer Millisekunde'
          multiple:
            forms: 'Millisekunden'
            beforeCount: 'vor'
        second:
          single: 'vor einer Sekunde'
          multiple:
            forms: 'Sekunden'
            beforeCount: 'vor'
        minute:
          single: 'vor einer Minute'
          multiple:
            forms: 'Minuten'
            beforeCount: 'vor'
        hour:
          single: 'vor einer Stunde'
          multiple:
            forms: 'Stunden'
            beforeCount: 'vor'
        day:
          single: 'gestern'
          template:
            name: 'two'
            value: 'vorgestern'
          multiple:
            forms: 'Tagen'
            beforeCount: 'vor'
        week:
          single: 'vor einer Woche'
          multiple:
            forms: 'Wochen'
            beforeCount: 'vor'
        month:
          single: 'vor einem Monat'
          multiple:
            forms: 'Monaten'
            beforeCount: 'vor'
        year:
          single: 'vor einem Jahr'
          multiple:
            forms: 'Jahren'
            beforeCount: 'vor'
      future:
        millisecond:
          single: 'in einer Millisekunde'
          multiple:
            forms: 'Millisekunden'
            beforeCount: 'in'
        second:
          single: 'in einer Sekunde'
          multiple:
            forms: 'Sekunden'
            beforeCount: 'in'
        minute:
          single: 'in einer Minute'
          multiple:
            forms: 'Minuten'
            beforeCount: 'in'
        hour:
          single: 'in einer Stunde'
          multiple:
            forms: 'Stunden'
            beforeCount: 'in'
        day:
          single: 'morgen'
          template:
            name: 'two'
            value: 'übermorgen'
          multiple:
            forms: 'Tagen'
            beforeCount: 'in'
        week:
          single: 'in einer Woche'
          multiple:
            forms: 'Wochen'
            beforeCount: 'in'
        month:
          single: 'in einem Monat'
          multiple:
            forms: 'Monaten'
            beforeCount: 'in'
        year:
          single: 'in einem Jahr'
          multiple:
            forms: 'Jahren'
            beforeCount: 'in'
    duration:
      zero: 'Keine Zeit'
      age:
        template: '{value} alt'
      millisecond:
        single:
          numeric: '1 Millisekunde'
          words: 'eine Millisekunde'
        multiple:
          forms: 'Millisekunden'
      second:
        single:
          numeric: '1 Sekunde'
          words: 'eine Sekunde'
        multiple:
          forms: 'Sekunden'
      minute:
        single:
          numeric: '1 Minute'
          words: 'eine Minute'
        multiple:
          forms: 'Minuten'
      hour:
        single:
          numeric: '1 Stunde'
          words: 'eine Stunde'
        multiple:
          forms: 'Stunden'
      day:
        single:
          numeric: '1 Tag'
          words: 'ein Tag'
        multiple:
          forms: 'Tage'
      week:
        single:
          numeric: '1 Woche'
          words: 'eine Woche'
        multiple:
          forms: 'Wochen'
      month:
        single:
          numeric: '1 Monat'
          words: 'ein Monat'
        multiple:
          forms: 'Monate'
      year:
        single:
          numeric: '1 Jahr'
          words: 'ein Jahr'
        multiple:
          forms: 'Jahre'
    dataUnits:
      bit:
        forms: 'Bit'
        symbol: 'bit'
        template: '{unit}'
      byte:
        forms: 'Byte'
        symbol: 'B'
        template: '{unit}'
      kilobyte:
        forms: 'Kilobyte'
        symbol: 'kB'
        template: '{unit}'
      megabyte:
        forms: 'Megabyte'
        symbol: 'MB'
        template: '{unit}'
      gigabyte:
        forms: 'Gigabyte'
        symbol: 'GB'
        template: '{unit}'
      terabyte:
        forms: 'Terabyte'
        symbol: 'TB'
        template: '{unit}'
    timeUnits:
      millisecond:
        symbol: 'ms'
      second:
        symbol: 's'
      minute:
        symbol: 'min'
      hour:
        symbol: 'h'
      day:
        symbol: 'd'
      week:
        symbol: 'Woche'
      month:
        symbol: 'M'
      year:
        symbol: 'a'

  number:
    words:
      engine: 'unit-leading-compound'
      zeroWord: 'null'
      minusWord: 'minus '
      masculineOne: 'eins'
      feminineOne: 'eine'
      neuterOne: 'eins'
      tensJoiner: 'und'
      ordinalStemSuffix: 's'
      masculineOrdinalEnding: 'ter'
      feminineOrdinalEnding: 'te'
      neuterOrdinalEnding: 'tes'
      supportsEifelerRule: false
      unitsMap:
        1: 'ein'
        2: 'zwei'
        3: 'drei'
        4: 'vier'
        5: 'fünf'
        6: 'sechs'
        7: 'sieben'
        8: 'acht'
        9: 'neun'
        10: 'zehn'
        11: 'elf'
        12: 'zwölf'
        13: 'dreizehn'
        14: 'vierzehn'
        15: 'fünfzehn'
        16: 'sechzehn'
        17: 'siebzehn'
        18: 'achtzehn'
        19: 'neunzehn'
      compoundUnitsMap:
        1: 'ein'
        2: 'zwei'
        3: 'drei'
        4: 'vier'
        5: 'fünf'
        6: 'sechs'
        7: 'sieben'
        8: 'acht'
        9: 'neun'
        10: 'zehn'
        11: 'elf'
        12: 'zwölf'
        13: 'dreizehn'
        14: 'vierzehn'
        15: 'fünfzehn'
        16: 'sechzehn'
        17: 'siebzehn'
        18: 'achtzehn'
        19: 'neunzehn'
      tensMap:
        1: 'zehn'
        2: 'zwanzig'
        3: 'dreißig'
        4: 'vierzig'
        5: 'fünfzig'
        6: 'sechzig'
        7: 'siebzig'
        8: 'achtzig'
        9: 'neunzig'
      unitsOrdinal:
        1: 'ers'
        2: 'zwei'
        3: 'drit'
        4: 'vier'
        5: 'fünf'
        6: 'sechs'
        7: 'sieb'
        8: 'ach'
        9: 'neun'
        10: 'zehn'
        11: 'elf'
        12: 'zwölf'
        13: 'dreizehn'
        14: 'vierzehn'
        15: 'fünfzehn'
        16: 'sechzehn'
        17: 'siebzehn'
        18: 'achtzehn'
        19: 'neunzehn'
      scales:
        -
          value: 1000000000000000000
          addSpaceBeforeNextPart: true
          singularCardinal: 'eine Trillion'
          pluralCardinalFormat: '{0} Trillionen'
          ordinalSingular:
            terminal: 'eintrillion'
            continuing: 'einetrillion'
          ordinalPlural:
            terminal: '{0}trillion'
            continuing: '{0}trillionen'
        -
          value: 1000000000000000
          addSpaceBeforeNextPart: true
          singularCardinal: 'eine Billiarde'
          pluralCardinalFormat: '{0} Billiarden'
          ordinalSingular:
            terminal: 'einbilliard'
            continuing: 'einebilliarde'
          ordinalPlural:
            terminal: '{0}billiard'
            continuing: '{0}billiarden'
        -
          value: 1000000000000
          addSpaceBeforeNextPart: true
          singularCardinal: 'eine Billion'
          pluralCardinalFormat: '{0} Billionen'
          ordinalSingular:
            terminal: 'einbillion'
            continuing: 'einebillion'
          ordinalPlural:
            terminal: '{0}billion'
            continuing: '{0}billionen'
        -
          value: 1000000000
          addSpaceBeforeNextPart: true
          singularCardinal: 'eine Milliarde'
          pluralCardinalFormat: '{0} Milliarden'
          ordinalSingular:
            terminal: 'einmilliard'
            continuing: 'einemilliarde'
          ordinalPlural:
            terminal: '{0}milliard'
            continuing: '{0}milliarden'
        -
          value: 1000000
          addSpaceBeforeNextPart: true
          singularCardinal: 'eine Million'
          pluralCardinalFormat: '{0} Millionen'
          ordinalSingular:
            terminal: 'einmillion'
            continuing: 'einemillion'
          ordinalPlural:
            terminal: '{0}million'
            continuing: '{0}millionen'
        -
          value: 1000
          addSpaceBeforeNextPart: false
          singularCardinal: 'eintausend'
          pluralCardinalFormat: '{0}tausend'
          ordinalSingular: 'eintausend'
          ordinalPlural: '{0}tausend'
        -
          value: 100
          addSpaceBeforeNextPart: false
          singularCardinal: 'einhundert'
          pluralCardinalFormat: '{0}hundert'
          ordinalSingular: 'einhundert'
          ordinalPlural: '{0}hundert'

