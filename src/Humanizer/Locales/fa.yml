          name: 'تریلیون'
        -
          value: 1000000000000000
          name: 'بیلیارد'
        -
          value: 1000000000000
          name: 'بیلیون'
        -
          value: 1000000000
          name: 'میلیارد'
        -
          value: 1000000
          name: 'میلیون'
        -
          value: 1000
          name: 'هزار'
      ordinalExceptions:
        1: 'اول'
        3: 'سوم'
      compoundOrdinalRemainder: 3
      compoundOrdinalWord: 'سوم'
      compoundOrdinalExcludedValues:
        - 13

    parse:
