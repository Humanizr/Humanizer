  number:
    words:
      engine: 'joined-scale'
      maximumValue: 9223372036854775807
      zeroWord: 'صفر'
      minusWord: 'منفی'
      negativeJoinWord: ' '
      joinWord: ' و '
      scaleCountJoinWord: ' '
      defaultOrdinalSuffix: 'م'
      matchingOrdinalSuffix: ' ام'
      ordinalSuffixMatchCharacters: 'ی'
      unitsMap:
        - 'صفر'
        - 'یک'
        - 'دو'
        - 'سه'
        - 'چهار'
        - 'پنج'
        - 'شش'
        - 'هفت'
        - 'هشت'
        - 'نه'
        - 'ده'
        - 'یازده'
        - 'دوازده'
        - 'سیزده'
        - 'چهارده'
        - 'پانزده'
        - 'شانزده'
        - 'هفده'
        - 'هجده'
        - 'نوزده'
      tensMap:
        - 'صفر'
        - 'ده'
        - 'بیست'
        - 'سی'
        - 'چهل'
        - 'پنجاه'
        - 'شصت'
        - 'هفتاد'
        - 'هشتاد'
        - 'نود'
      hundredsMap:
