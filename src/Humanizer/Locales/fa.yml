          multiple:
            forms:
              default: 'ماه'
            afterCount: 'پیش'
        year:
          single: 'یک سال پیش'
          multiple:
            forms:
              default: 'سال'
            afterCount: 'پیش'
      future:
        millisecond:
          single: 'یک میلی‌ثانیه بعد'
          multiple:
            forms:
              default: 'میلی‌ثانیه'
            afterCount: 'بعد'
        second:
          single: 'یک ثانیه بعد'
          multiple:
            forms:
              default: 'ثانیه'
            afterCount: 'بعد'
        minute:
          single: 'یک دقیقه بعد'
