      now: 'الآن'
      never: 'هرگز'
      past:
        millisecond:
          single: 'یک میلی‌ثانیه پیش'
          multiple:
            forms:
              default: 'میلی‌ثانیه'
            afterCount: 'پیش'
        second:
          single: 'یک ثانیه پیش'
          multiple:
            forms:
              default: 'ثانیه'
            afterCount: 'پیش'
        minute:
          single: 'یک دقیقه پیش'
          multiple:
            forms:
              default: 'دقیقه'
            afterCount: 'پیش'
        hour:
