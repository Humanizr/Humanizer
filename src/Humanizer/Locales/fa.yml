      - 'ش‌غر'
      - 'ش‌ش‌غر'

  clock:
    engine: 'phrase-clock'
    hourMode: 'h12'
    min0: '{hour}'
    defaultTemplate: '{hour} و {minutes}'
    earlyMorning: 'بامداد'
    morning: 'صبح'
    afternoon: 'بعدازظهر'
    night: 'شب'

  ordinal:
    numeric:
      engine: 'suffix'
      masculineSuffix: 'م'
      zeroAsPlainNumber: true
    date:
      pattern: '{day} MMMM yyyy'
      dayMode: 'Numeric'
    dateOnly:
      pattern: '{day} MMMM yyyy'
      dayMode: 'Numeric'
