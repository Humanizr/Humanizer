        'هفده': 17
        'هجده': 18
        'نوزده': 19
        'بیست': 20
        'سی': 30
        'چهل': 40
        'پنجاه': 50
        'شصت': 60
        'هفتاد': 70
        'هشتاد': 80
        'نود': 90
        'صد': 100
        'دویست': 200
        'سیصد': 300
        'چهارصد': 400
        'پانصد': 500
        'ششصد': 600
        'هفتصد': 700
        'هشتصد': 800
        'نهصد': 900
        'هزار': 1000
        'میلیون': 1000000
        'میلیارد': 1000000000
        'بیلیون': 1000000000000
        'بیلیارد': 1000000000000000
        'تریلیون': 1000000000000000000
