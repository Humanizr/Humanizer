      - 'جنوب'
      - 'جنوب‌جنوب‌غرب'
      - 'جنوب‌غرب'
      - 'غرب‌جنوب‌غرب'
      - 'غرب'
      - 'غرب‌شمال‌غرب'
      - 'شمال‌غرب'
      - 'شمال‌شمال‌غرب'
    short:
