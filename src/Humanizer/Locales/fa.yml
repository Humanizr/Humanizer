          single: 'یک هفته بعد'
          multiple:
            forms:
              default: 'هفته'
            afterCount: 'بعد'
        month:
          single: 'یک ماه بعد'
          multiple:
            forms:
              default: 'ماه'
            afterCount: 'بعد'
        year:
          single: 'یک سال بعد'
          multiple:
            forms:
              default: 'سال'
            afterCount: 'بعد'
    duration:
      zero: 'الآن'
      age:
        template: '{value}'
      millisecond:
        single:
          numeric: 'یک میلی‌ثانیه'
          words: 'یک میلی‌ثانیه'
        multiple:
          forms:
            default: 'میلی‌ثانیه'
      second:
        single:
          numeric: 'یک ثانیه'
          words: 'یک ثانیه'
        multiple:
          forms:
            default: 'ثانیه'
      minute:
        single:
          numeric: 'یک دقیقه'
          words: 'یک دقیقه'
        multiple:
          forms:
            default: 'دقیقه'
      hour:
        single:
          numeric: 'یک ساعت'
          words: 'یک ساعت'
        multiple:
          forms:
            default: 'ساعت'
      day:
        single:
          numeric: 'یک روز'
          words: 'یک روز'
        multiple:
          forms:
            default: 'روز'
      week:
        single:
          numeric: 'یک هفته'
