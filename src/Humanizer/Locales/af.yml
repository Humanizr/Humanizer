# Locale-owned generator data for af.
# Omit a feature to inherit it from the parent locale.
# Inline mappings below are the source of truth for generated profiles and token-map lexicons.
collectionFormatter:
  engine: 'conjunction'
  value: 'en'
numberToWords:
  engine: 'inverted-tens'
  minusWord: 'minus'
  unitsMap:
    - 'nul'
    - 'een'
    - 'twee'
    - 'drie'
    - 'vier'
    - 'vyf'
    - 'ses'
    - 'sewe'
    - 'agt'
    - 'nege'
    - 'tien'
    - 'elf'
    - 'twaalf'
    - 'dertien'
    - 'veertien'
    - 'vyftien'
    - 'sestien'
    - 'sewentien'
    - 'agtien'
    - 'negentien'
  tensMap:
    - 'nul'
    - 'tien'
    - 'twintig'
    - 'dertig'
    - 'veertig'
    - 'vyftig'
    - 'sestig'
    - 'sewentig'
    - 'tagtig'
    - 'negentig'
  hundredsPrefixMap:
    1: 'een'
    2: 'twee'
    3: 'drie'
    4: 'vier'
    5: 'vyf'
    6: 'ses'
    7: 'sewe'
    8: 'agt'
    9: 'nege'
  oneHundredWord: 'een honderd'
  hundredWord: 'honderd'
  hundredJoiner: ' '
  hundredRemainderSeparator: ' '
  scaleTailPrefix: 'en '
  scaleTailPrefixMode: 'low-or-exact-tens'
  hundredTailPrefix: 'en '
  hundredTailPrefixMode: 'low-or-exact-tens'
  unitTensJoiner: ' en '
  scales:
    -
      value: 1000000000
      oneForm: 'een miljard'
      manyForm: 'miljard'
      countJoiner: ' '
      remainderSeparator: ' '
    -
      value: 1000000
      oneForm: 'een miljoen'
      manyForm: 'miljoen'
      countJoiner: ' '
      remainderSeparator: ' '
    -
      value: 1000
      oneForm: 'een duisend'
      manyForm: 'duisend'
      countJoiner: ' '
      remainderSeparator: ' '
  ordinalMode: 'suffix'
  ordinalExceptions:
    nul: 'nulste'
    een: 'eerste'
    drie: 'derde'
    sewe: 'sewende'
    agt: 'agste'
    nege: 'negende'
    tien: 'tiende'
    miljoen: 'miljoenste'
  ordinalSteSuffixEndingChars: 'tgd'
  ordinalSteSuffix: 'ste'
  ordinalDefaultSuffix: 'de'
  removeLeadingOneInOrdinal: true
  leadingOneWord: 'een '
  leadingOnePreservePrefix: 'een en '
ordinalizer:
  engine: 'modulo-suffix'
  defaultSuffix: 'de'
  useAbsoluteValue: true
  absoluteAtLeast:
    value: 20
    suffix: 'ste'
  exactSuffixes:
    '1': 'ste'
    '2': 'de'
    '3': 'de'
    '8': 'ste'
wordsToNumber:
  engine: 'token-map'
  normalizationProfile: 'LowercaseRemovePeriods'
  cardinalMap:
    nul: 0
    een: 1
    twee: 2
    drie: 3
    vier: 4
    vyf: 5
    ses: 6
    sewe: 7
    agt: 8
    nege: 9
    tien: 10
    elf: 11
    twaalf: 12
    dertien: 13
    veertien: 14
    vyftien: 15
    sestien: 16
    sewentien: 17
    agtien: 18
    negentien: 19
    twintig: 20
    dertig: 30
    veertig: 40
    vyftig: 50
    sestig: 60
    sewentig: 70
    tagtig: 80
    negentig: 90
    honderd: 100
    duisend: 1000
    miljoen: 1000000
    miljard: 1000000000
  useHundredMultiplier: true
  negativePrefixes:
    - 'minus '
  ignoredTokens:
    - 'en'
