# Locale-owned generator data for en.
# Omit a feature to inherit it from the parent locale.
# Inline mappings below are the source of truth for generated profiles and token-map lexicons.
collectionFormatter: 'oxford'
numberToWords:
  engine: 'conjunctional-scale'
  minusWord: 'minus'
  andWord: 'and'
  hundredWord: 'hundred'
  hundredOrdinalWord: 'hundredth'
  tensUnitsSeparator: '-'
  defaultAddAnd: true
  addAndMode: 'use-caller-flag'
  andStrategy: 'within-group-and-after-scale-sub-hundred-remainder'
  tupleSuffix: '-tuple'
  ordinalLeadingOneStrategy: 'omit-leading-one'
  ordinalMode: 'english'
  unitsMap:
    0: 'zero'
    1: 'one'
    2: 'two'
    3: 'three'
    4: 'four'
    5: 'five'
    6: 'six'
    7: 'seven'
    8: 'eight'
    9: 'nine'
    10: 'ten'
    11: 'eleven'
    12: 'twelve'
    13: 'thirteen'
    14: 'fourteen'
    15: 'fifteen'
    16: 'sixteen'
    17: 'seventeen'
    18: 'eighteen'
    19: 'nineteen'
  ordinalUnitsMap:
    0: 'zeroth'
    1: 'first'
    2: 'second'
    3: 'third'
    4: 'fourth'
    5: 'fifth'
    6: 'sixth'
    7: 'seventh'
    8: 'eighth'
    9: 'ninth'
    10: 'tenth'
    11: 'eleventh'
    12: 'twelfth'
    13: 'thirteenth'
    14: 'fourteenth'
    15: 'fifteenth'
    16: 'sixteenth'
    17: 'seventeenth'
    18: 'eighteenth'
    19: 'nineteenth'
  tensMap:
    - 'zero'
    - 'ten'
    - 'twenty'
    - 'thirty'
    - 'forty'
    - 'fifty'
    - 'sixty'
    - 'seventy'
    - 'eighty'
    - 'ninety'
  ordinalTensMap:
    - 'zeroth'
    - 'tenth'
    - 'twentieth'
    - 'thirtieth'
    - 'fortieth'
    - 'fiftieth'
    - 'sixtieth'
    - 'seventieth'
    - 'eightieth'
    - 'ninetieth'
  scales:
    -
      value: 1000000000000000000
      name: 'quintillion'
      ordinalName: 'quintillionth'
    -
      value: 1000000000000000
      name: 'quadrillion'
      ordinalName: 'quadrillionth'
    -
      value: 1000000000000
      name: 'trillion'
      ordinalName: 'trillionth'
    -
      value: 1000000000
      name: 'billion'
      ordinalName: 'billionth'
    -
      value: 1000000
      name: 'million'
      ordinalName: 'millionth'
    -
      value: 1000
      name: 'thousand'
      ordinalName: 'thousandth'
  namedTuples:
    '1': 'single'
    '2': 'double'
    '3': 'triple'
    '4': 'quadruple'
    '5': 'quintuple'
    '6': 'sextuple'
    '7': 'septuple'
    '8': 'octuple'
    '9': 'nonuple'
    '10': 'decuple'
    '100': 'centuple'
    '1000': 'milluple'
ordinalizer:
  engine: 'modulo-suffix'
  defaultSuffix: 'th'
  useAbsoluteValue: true
  lastTwoDigitsRange:
    start: 11
    end: 20
    suffix: 'th'
  lastDigitSuffixes:
    '1': 'st'
    '2': 'nd'
    '3': 'rd'
wordsToNumber:
  engine: 'token-map'
  normalizationProfile: 'LowercaseRemovePeriods'
  cardinalMap:
    zero: 0
    one: 1
    two: 2
    three: 3
    four: 4
    five: 5
    six: 6
    seven: 7
    eight: 8
    nine: 9
    ten: 10
    eleven: 11
    twelve: 12
    thirteen: 13
    fourteen: 14
    fifteen: 15
    sixteen: 16
    seventeen: 17
    eighteen: 18
    nineteen: 19
    twenty: 20
    thirty: 30
    forty: 40
    fifty: 50
    sixty: 60
    seventy: 70
    eighty: 80
    ninety: 90
    hundred: 100
    thousand: 1000
    million: 1000000
    billion: 1000000000
  ordinalMap:
    first: 1
    second: 2
    third: 3
    fourth: 4
    fifth: 5
    sixth: 6
    seventh: 7
    eighth: 8
    ninth: 9
    tenth: 10
    eleventh: 11
    twelfth: 12
    thirteenth: 13
    fourteenth: 14
    fifteenth: 15
    sixteenth: 16
    seventeenth: 17
    eighteenth: 18
    nineteenth: 19
