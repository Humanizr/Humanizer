          words: 'aon lá'
        multiple:
          forms:
            singular: 'lá'
            dual: 'lá'
            plural: 'lá'
            default: 'lá'
      week:
        single:
          numeric: '1 seachtain'
          words: 'aon seachtain'
        multiple:
          forms:
            singular: 'seachtain'
            dual: 'sheachtain'
            plural: 'seachtain'
            default: 'seachtain'
      month:
        single:
          numeric: '1 mhí'
          words: 'aon mhí'
        multiple:
          forms:
            singular: 'mí'
            dual: 'mhí'
            plural: 'mí'
            default: 'mí'
      year:
        single:
          numeric: '1 bhliain'
          words: 'aon bhliain'
        multiple:
          forms:
            singular: 'bliain'
            dual: 'bhliain'
            plural: 'bliana'
            default: 'bliain'
