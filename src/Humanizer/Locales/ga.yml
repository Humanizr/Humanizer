locale: 'ga'

surfaces:
  list:
    engine: 'conjunction'
    value: 'agus'

  formatter:
    engine: 'profiled'
    pluralRule: 'arabic-like'
    dataUnitPluralRule: 'singular-plural'

  phrases:
