          singular: 'teiribheart'
          default: 'teiribheart'
        symbol: 'TB'
    timeUnits:
      millisecond:
        symbol: 'ms'
      second:
        symbol: 's'
      minute:
        symbol: 'nóim'
      hour:
        symbol: 'u'
      day:
        symbol: 'lá'
      week:
        symbol: 'seacht.'
      month:
        symbol: 'mí'
      year:
