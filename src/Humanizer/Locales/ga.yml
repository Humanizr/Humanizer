          multiple:
            forms:
              singular: 'lá'
              dual: 'lá'
              plural: 'lá'
              default: 'lá'
            template: '{count} {unit} ó shin'
        week:
          single: 'seachtain ó shin'
          multiple:
            forms:
              singular: 'seachtain'
              dual: 'sheachtain'
              plural: 'seachtain'
              default: 'seachtain'
            template: '{count} {unit} ó shin'
        month:
          single: 'mí ó shin'
          multiple:
            forms:
              singular: 'mí'
              dual: 'mhí'
              plural: 'mí'
              default: 'mí'
            template: '{count} {unit} ó shin'
        year:
          single: 'bliain ó shin'
          multiple:
            forms:
              singular: 'bliain'
              dual: 'bhliain'
              plural: 'bliana'
              default: 'bliain'
            template: '{count} {unit} ó shin'
      future:
        millisecond:
          single: 'i gceann milleasoicind'
          multiple:
            forms:
              singular: 'milleasoicind'
              dual: 'mhilleasoicind'
              plural: 'milleasoicind'
              default: 'milleasoicind'
            template: 'i gceann {count} {unit}'
        second:
          single: 'i gceann soicind'
          multiple:
            forms:
              singular: 'soicind'
              dual: 'shoicind'
              plural: 'soicind'
              default: 'soicind'
            template: 'i gceann {count} {unit}'
        minute:
          single: 'i gceann nóiméid'
          multiple:
            forms:
              singular: 'nóiméad'
              dual: 'nóiméad'
              plural: 'nóiméad'
              default: 'nóiméad'
            template: 'i gceann {count} {unit}'
        hour:
          single: 'i gceann uair an chloig'
          multiple:
            forms:
              singular: 'uair an chloig'
              dual: 'uair an chloig'
              plural: 'uair an chloig'
              default: 'uair an chloig'
            template: 'i gceann {count} {unit}'
        day:
          single: 'amárach'
          multiple:
            forms:
              singular: 'lá'
              dual: 'lá'
              plural: 'lá'
              default: 'lá'
            template: 'i gceann {count} {unit}'
        week:
          single: 'i gceann seachtaine'
          multiple:
            forms:
              singular: 'seachtain'
              dual: 'sheachtain'
              plural: 'seachtain'
              default: 'seachtain'
            template: 'i gceann {count} {unit}'
        month:
          single: 'i gceann míosa'
          multiple:
            forms:
              singular: 'mí'
              dual: 'mhí'
              plural: 'mí'
              default: 'mí'
            template: 'i gceann {count} {unit}'
        year:
          single: 'i gceann bliana'
          multiple:
            forms:
              singular: 'bliain'
              dual: 'bhliain'
              plural: 'bliana'
              default: 'bliain'
            template: 'i gceann {count} {unit}'
    duration:
      zero: 'gan am'
      age:
        template: '{value} d''aois'
      millisecond:
        single:
          numeric: '1 mhilleasoicind'
          words: 'aon mhilleasoicind'
        multiple:
          forms:
            singular: 'milleasoicind'
            dual: 'mhilleasoicind'
            plural: 'milleasoicind'
            default: 'milleasoicind'
      second:
        single:
          numeric: '1 soicind'
          words: 'aon soicind'
        multiple:
          forms:
            singular: 'soicind'
            dual: 'shoicind'
            plural: 'soicind'
            default: 'soicind'
      minute:
        single:
          numeric: '1 nóiméad'
          words: 'aon nóiméad'
        multiple:
          forms:
            singular: 'nóiméad'
            dual: 'nóiméad'
            plural: 'nóiméad'
            default: 'nóiméad'
      hour:
        single:
          numeric: '1 uair an chloig'
          words: 'aon uair an chloig'
        multiple:
          forms:
            singular: 'uair an chloig'
            dual: 'uair an chloig'
            plural: 'uair an chloig'
            default: 'uair an chloig'
      day:
