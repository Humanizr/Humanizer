      engine: 'template'
      masculine:
        defaultSuffix: 'ú'
      feminine:
        defaultSuffix: 'ú'
      neuter:
        defaultSuffix: 'ú'
    date:
      engine: 'pattern'
      pattern: '{day} MMMM yyyy'
      dayMode: 'Numeric'
