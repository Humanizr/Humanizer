      now: 'anois'
      never: 'riamh'
      past:
        millisecond:
          single: 'milleasoicind ó shin'
          multiple:
            forms:
              singular: 'milleasoicind'
              dual: 'mhilleasoicind'
              plural: 'milleasoicind'
              default: 'milleasoicind'
            template: '{count} {unit} ó shin'
        second:
          single: 'soicind ó shin'
          multiple:
            forms:
              singular: 'soicind'
              dual: 'shoicind'
              plural: 'soicind'
              default: 'soicind'
            template: '{count} {unit} ó shin'
        minute:
          single: 'nóiméad ó shin'
          multiple:
            forms:
              singular: 'nóiméad'
              dual: 'nóiméad'
              plural: 'nóiméad'
              default: 'nóiméad'
            template: '{count} {unit} ó shin'
        hour:
