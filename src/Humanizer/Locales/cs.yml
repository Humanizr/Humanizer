    timeUnits:
      millisecond:
        symbol: 'ms'
      second:
        symbol: 's'
      minute:
        symbol: 'min'
      hour:
        symbol: 'h'
      day:
        symbol: 'den'
      week:
        symbol: 'týden'
      month:
        symbol: 'měsíc'
      year:
        symbol: 'rok'

