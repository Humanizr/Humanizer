        kintilyan: 1000000000000000000
      unitMap:
        kow: 1
        hal: 1
        laba: 2
        saddex: 3
        afar: 4
        shan: 5
        lix: 6
        toddoba: 7
        siddeed: 8
        sagaal: 9
      tensTokens:
