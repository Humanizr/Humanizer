          manyForm: 'bilyan'
          countJoiner: ' '
          remainderSeparator: ' '
        -
          value: 1000000
          oneForm: 'milyan'
          manyForm: 'milyan'
          countJoiner: ' '
          remainderSeparator: ' '
        -
