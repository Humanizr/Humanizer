        kow: 'koowaad'
        laba: 'labaad'
        afar: 'afraad'
        toddoba: 'toddobaad'
        toban: 'tobnaad'
      ordinalDefaultSuffix: 'aad'
      removeLeadingOneInOrdinal: false
    formatting:
      decimalSeparator: '.'
      groupSeparator: ','
      negativeSign: '-'
    parse:
