        - 'afar'
        - 'shan'
        - 'lix'
        - 'toddoba'
        - 'siddeed'
        - 'sagaal'
        - 'toban'
        - 'kow iyo toban'
        - 'laba iyo toban'
        - 'saddex iyo toban'
        - 'afar iyo toban'
        - 'shan iyo toban'
        - 'lix iyo toban'
        - 'toddoba iyo toban'
        - 'siddeed iyo toban'
        - 'sagaal iyo toban'
      tensMap:
        2: 'labaatan'
        3: 'soddon'
        4: 'afartan'
        5: 'konton'
        6: 'lixdan'
        7: 'toddobaatan'
        8: 'siddeetan'
        9: 'sagaashan'
      hundredsPrefixMap:
        0: ''
        1: ''
        2: 'laba'
        3: 'saddex'
        4: 'afar'
        5: 'shan'
        6: 'lix'
        7: 'toddoba'
        8: 'siddeed'
        9: 'sagaal'
      oneHundredWord: 'boqol'
      hundredWord: 'boqol'
      hundredJoiner: ' '
      hundredRemainderSeparator: ' iyo '
      unitTensJoiner: ' iyo '
      scales:
