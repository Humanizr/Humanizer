          word: 'siddeetan'
          value: 80
        -
          word: 'toddobaatan'
          value: 70
        -
          word: 'lixdan'
          value: 60
        -
          word: 'konton'
          value: 50
        -
          word: 'afartan'
          value: 40
        -
          word: 'soddon'
          value: 30
        -
          word: 'labaatan'
          value: 20
        -
          word: 'toban'
          value: 10
      tensLinker: 'iyo'
      scaleTokens:
        - 'kintilyan'
        - 'kwadrilyan'
        - 'tirilyan'
        - 'bilyan'
        - 'milyan'
        - 'kun'
        - 'boqol'
      ordinalMap:
        koowaad: 1
        labaad: 2
        saddexaad: 3
        afraad: 4
        shanaad: 5
        lixaad: 6
        toddobaad: 7
        siddeedaad: 8
        sagaalaad: 9
        tobnaad: 10
