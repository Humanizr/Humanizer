locale: 'so'

surfaces:
  list:
    engine: 'conjunction'
    value: 'iyo'

  formatter:
    engine: 'profiled'
    pluralRule: 'singular-plural'
    dataUnitPluralRule: 'singular-plural'

  phrases:
    relativeDate:
      now: 'hadda'
      never: 'marnaba'
      past:
        millisecond:
          single: '1 milisekan ka hor'
          multiple:
            forms:
              default: 'milisekan'
            template: '{count} milisekan ka hor'
        second:
          single: '1 ilbiriqsi ka hor'
          multiple:
            forms:
              default: 'ilbiriqsi'
            template: '{count} ilbiriqsi ka hor'
        minute:
          single: '1 daqiiqo ka hor'
          multiple:
            forms:
              default: 'daqiiqo'
            template: '{count} daqiiqo ka hor'
        hour:
          single: '1 saac ka hor'
          multiple:
            forms:
              default: 'saacadood'
            template: '{count} saacadood ka hor'
        day:
          single: 'shalay'
          multiple:
            forms:
              default: 'maalmood'
            template: '{count} maalmood ka hor'
        week:
          single: '1 toddobaad ka hor'
          multiple:
            forms:
              default: 'toddobaad'
            template: '{count} toddobaad ka hor'
        month:
          single: '1 bil ka hor'
          multiple:
            forms:
              default: 'bilood'
            template: '{count} bilood ka hor'
        year:
          single: '1 sano ka hor'
          multiple:
            forms:
              default: 'sano'
            template: '{count} sano ka hor'
      future:
        millisecond:
          single: '1 milisekan kadib'
          multiple:
            forms:
              default: 'milisekan'
            template: '{count} milisekan kadib'
        second:
          single: '1 ilbiriqsi kadib'
          multiple:
            forms:
              default: 'ilbiriqsi'
            template: '{count} ilbiriqsi kadib'
        minute:
          single: '1 daqiiqo kadib'
          multiple:
            forms:
              default: 'daqiiqo'
            template: '{count} daqiiqo kadib'
        hour:
          single: '1 saac kadib'
          multiple:
            forms:
              default: 'saacadood'
            template: '{count} saacadood kadib'
        day:
          single: 'berri'
          multiple:
            forms:
              default: 'maalmood'
            template: '{count} maalmood kadib'
        week:
          single: '1 toddobaad kadib'
          multiple:
            forms:
              default: 'toddobaad'
            template: '{count} toddobaad kadib'
        month:
          single: '1 bil kadib'
          multiple:
            forms:
              default: 'bilood'
            template: '{count} bilood kadib'
        year:
          single: '1 sano kadib'
          multiple:
            forms:
              default: 'sano'
            template: '{count} sano kadib'
    duration:
      zero: 'waqti ma jiro'
      age:
        template: '{value}'
      millisecond:
        single:
          numeric: '1 milisekan'
          words: 'hal milisekan'
        multiple:
          forms:
            default: 'milisekan'
      second:
        single:
          numeric: '1 ilbiriqsi'
          words: 'hal ilbiriqsi'
        multiple:
          forms:
            default: 'ilbiriqsi'
      minute:
        single:
          numeric: '1 daqiiqo'
          words: 'hal daqiiqo'
        multiple:
          forms:
            default: 'daqiiqo'
      hour:
        single:
          numeric: '1 saac'
          words: 'hal saac'
        multiple:
          forms:
            default: 'saacadood'
      day:
        single:
          numeric: '1 maalin'
          words: 'hal maalin'
        multiple:
          forms:
            default: 'maalmood'
      week:
        single:
          numeric: '1 toddobaad'
          words: 'hal toddobaad'
        multiple:
          forms:
            default: 'toddobaad'
      month:
        single:
          numeric: '1 bil'
          words: 'hal bil'
        multiple:
          forms:
            default: 'bilood'
      year:
        single:
          numeric: '1 sano'
          words: 'hal sano'
        multiple:
          forms:
            default: 'sano'
    dataUnits:
      bit:
        forms:
          default: 'bit'
        symbol: 'b'
      byte:
        forms:
          default: 'bayt'
        symbol: 'B'
      kilobyte:
        forms:
          default: 'kilobayt'
        symbol: 'KB'
      megabyte:
        forms:
          default: 'megabayt'
        symbol: 'MB'
      gigabyte:
        forms:
          default: 'gigabayt'
        symbol: 'GB'
      terabyte:
        forms:
          default: 'terabayt'
        symbol: 'TB'
    timeUnits:
      millisecond:
        symbol: 'ms'
      second:
        symbol: 'ilb'
      minute:
        symbol: 'daq'
      hour:
        symbol: 'saac'
      day:
        symbol: 'maal'
      week:
        symbol: 'tod'
      month:
        symbol: 'bil'
      year:
        symbol: 'sano'

  number:
