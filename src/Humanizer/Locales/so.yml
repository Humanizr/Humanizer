  ordinal:
    numeric:
      engine: 'template'
      masculine:
        defaultSuffix: 'aad'
    date:
      pattern: '{day} MMMM yyyy'
      dayMode: 'Numeric'
    dateOnly:
      pattern: '{day} MMMM yyyy'
      dayMode: 'Numeric'

  clock:
    engine: 'phrase-clock'
    hourMode: 'h12'
    hourWordsMap:
      - ''
      - 'kow'
      - 'laba'
      - 'saddex'
      - 'afar'
      - 'shan'
      - 'lix'
      - 'toddoba'
      - 'siddeed'
      - 'sagaal'
      - 'toban'
      - 'kow iyo toban'
      - 'laba iyo toban'
    min0: '{hour} saac {dayPeriod}'
    defaultTemplate: '{hour} iyo {minutes} daqiiqo {dayPeriod}'
    earlyMorning: 'subaxnimo'
    morning: 'subaxnimo'
    afternoon: 'galabnimo'
    evening: 'fiidnimo'
    night: 'habeennimo'
    eveningStartHour: 18
    nightStartHour: 21

