# Locale-owned generator data for sr.
# Omit a feature to inherit it from the parent locale.
# Inline mappings below are the source of truth for generated profiles and token-map lexicons.
collectionFormatter:
  engine: 'conjunction'
  value: 'и'
formatter:
  engine: 'profiled'
  resourceKeyDetector: 'south-slavic'
  resourceKeySuffixes:
    paucal: '_Paucal'
  dataUnitDetector: 'south-slavic'
  dataUnitSuffixes:
    singular: '_Singular'
    paucal: '_Paucal'
  dataUnitFallbackTransform: 'trim-trailing-s'
numberToWords:
  engine: 'south-slavic-cardinal'
  useCulture: true
  maximumValue: 9223372036854775807
  allowLongMin: true
  zeroWord: 'нула'
  minusWord: '-'
  unitsMap:
    - 'нула'
    - 'један'
    - 'два'
    - 'три'
    - 'четири'
    - 'пет'
    - 'шест'
    - 'седам'
    - 'осам'
    - 'девет'
    - 'десет'
    - 'једанаест'
    - 'дванаест'
    - 'тринаест'
    - 'четрнаест'
    - 'петнаест'
    - 'шеснаест'
    - 'седамнаест'
    - 'осамнаест'
    - 'деветнаест'
  tensMap:
    - 'нула'
    - 'десет'
    - 'двадесет'
    - 'тридесет'
    - 'четрдесет'
    - 'петдесет'
    - 'шестдесет'
    - 'седамдесет'
    - 'осамдесет'
    - 'деветдесет'
  hundredsMap:
    - 'нула'
    - 'сто'
    - 'двесто'
    - 'тристо'
    - 'четиристо'
    - 'петсто'
    - 'шестсто'
    - 'седамсто'
    - 'осамсто'
    - 'деветсто'
  feminineOne: 'једна'
  feminineTwo: 'две'
  scales:
    -
      value: 1000000000000000
      gender: 'feminine'
      oneForm: 'билијарда'
      singular: 'билијарда'
      paucal: 'билијарде'
      plural: 'билијарди'
    -
      value: 1000000000000
      gender: 'masculine'
      oneForm: 'билион'
      singular: 'билион'
      paucal: 'билиона'
      plural: 'билиона'
    -
      value: 1000000000
      gender: 'feminine'
      oneForm: 'милијарда'
      singular: 'милијарда'
      paucal: 'милијарде'
      plural: 'милијарди'
    -
      value: 1000000
      gender: 'masculine'
      oneForm: 'милион'
      singular: 'милион'
      paucal: 'милиона'
      plural: 'милиона'
    -
      value: 1000
      gender: 'feminine'
      oneForm: 'хиљаду'
      singular: 'хиљада'
      paucal: 'хиљаде'
      plural: 'хиљада'
ordinalizer:
  engine: 'suffix'
  masculineSuffix: '.'
