      engine: 'suffix'
      masculineSuffix: '.'
      feminineSuffix: '.'
      neuterSuffix: '.'

    date:
      engine: 'pattern'
      pattern: "{day} MMMM yyyy'.'"
      dayMode: 'DotSuffix'
    dateOnly:
      engine: 'pattern'
      pattern: "{day} MMMM yyyy'.'"
      dayMode: 'DotSuffix'

  calendar:
