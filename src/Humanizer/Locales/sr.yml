        - 'двесто'
        - 'тристо'
        - 'четиристо'
        - 'петсто'
        - 'шестсто'
        - 'седамсто'
        - 'осамсто'
        - 'деветсто'
      feminineOne: 'једна'
      feminineTwo: 'две'
      scales:
        -
          value: 1000000000000000000
          gender: 'masculine'
          oneForm: 'трилион'
          singular: 'трилион'
          paucal: 'трилиона'
          plural: 'трилиона'
        -
          value: 1000000000000000
          gender: 'feminine'
          oneForm: 'билијарда'
          singular: 'билијарда'
          paucal: 'билијарде'
          plural: 'билијарди'
        -
          value: 1000000000000
          gender: 'masculine'
          oneForm: 'билион'
          singular: 'билион'
          paucal: 'билиона'
          plural: 'билиона'
        -
          value: 1000000000000000
          gender: 'feminine'
          oneForm: 'билијарда'
          singular: 'билијарда'
          paucal: 'билијарде'
          plural: 'билијарди'
        -
          value: 1000000000000
          gender: 'masculine'
          oneForm: 'билион'
          singular: 'билион'
          paucal: 'билиона'
          plural: 'билиона'
        -
          value: 1000000000
          gender: 'feminine'
          oneForm: 'милијарда'
          singular: 'милијарда'
          paucal: 'милијарде'
          plural: 'милијарди'
        -
          value: 1000000
          gender: 'masculine'
          oneForm: 'милион'
          singular: 'милион'
          paucal: 'милиона'
          plural: 'милиона'
        -
          value: 1000
          gender: 'feminine'
          oneForm: 'хиљаду'
          singular: 'хиљада'
          paucal: 'хиљаде'
          plural: 'хиљада'

    parse:
      engine: 'token-map'
      normalizationProfile: 'LowercaseRemovePeriods'
      cardinalMap:
