    19: 'devyniolikt'
    20: 'dvidešimt'
  ordinalTensMap:
    1: 'dešimt'
    2: 'dvidešimt'
    3: 'trisdešimt'
    4: 'keturiasdešimt'
    5: 'penkiasdešimt'
    6: 'šešiasdešimt'
    7: 'septyniasdešimt'
    8: 'aštuoniasdešimt'
