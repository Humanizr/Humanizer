# Locale-owned generator data for lt.
# Omit a feature to inherit it from the parent locale.
# Inline mappings below are the source of truth for generated profiles and token-map lexicons.
collectionFormatter:
  engine: 'conjunction'
  value: 'ir'
formatter:
  engine: 'profiled'
  resourceKeyOverrides:
    -
      number: 0
      suffix: ''
      keys:
        - 'TimeSpanHumanize_Zero'
        - 'DateHumanize_Now'
  resourceKeyDetector: 'lithuanian'
  resourceKeySuffixes:
    singular: '_Singular'
    plural: '_Plural'
  dataUnitDetector: 'lithuanian'
  dataUnitSuffixes:
    singular: '_Singular'
    plural: '_Plural'
  dataUnitFallbackTransform: 'trim-trailing-s'
numberToWords:
  engine: 'pluralized-scale'
  zeroWord: 'nulis'
  minusWord: 'minus'
  zeroOrdinalStem: 'nulin'
  formDetector: 'lithuanian'
  unitVariantStrategy: 'lithuanian'
  ordinalMode: 'lithuanian'
  supportsNeuter: false
  masculineOrdinalSuffix: 'as'
  feminineOrdinalSuffix: 'a'
  unitsMap:
    - 'nulis'
    - 'vienas'
    - 'du'
    - 'trys'
    - 'keturi'
    - 'penki'
    - 'šeši'
    - 'septyni'
    - 'aštuoni'
    - 'devyni'
    - 'dešimt'
    - 'vienuolika'
    - 'dvylika'
    - 'trylika'
    - 'keturiolika'
    - 'penkiolika'
    - 'šešiolika'
    - 'septyniolika'
    - 'aštuoniolika'
    - 'devyniolika'
  tensMap:
    1: 'dešimt'
    2: 'dvidešimt'
    3: 'trisdešimt'
    4: 'keturiasdešimt'
    5: 'penkiasdešimt'
    6: 'šešiasdešimt'
    7: 'septyniasdešimt'
    8: 'aštuoniasdešimt'
    9: 'devyniasdešimt'
  hundredsMap:
    1: 'šimtas'
    2: 'du šimtai'
