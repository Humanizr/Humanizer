# Locale-owned generator data for pl.
# Omit a feature to inherit it from the parent locale.
# Inline mappings below are the source of truth for generated profiles and token-map lexicons.
collectionFormatter:
  engine: 'conjunction'
  value: 'i'
formatter:
  engine: 'profiled'
  resourceKeyDetector: 'between2-and4-paucal'
  resourceKeySuffixes:
    paucal: '_Paucal'
  dataUnitDetector: 'between2-and4-paucal'
  dataUnitSuffixes:
    singular: '_Singular'
    paucal: '_Paucal'
  dataUnitFallbackTransform: 'trim-trailing-s'
numberToWords:
  engine: 'pluralized-scale'
  useCulture: true
  zeroWord: 'zero'
  minusWord: 'minus'
  formDetector: 'polish'
  unitVariantStrategy: 'polish'
  ordinalMode: 'numeric-culture'
  supportsNeuter: true
  unitsMap:
    - 'zero'
    - 'jeden'
    - 'dwa'
    - 'trzy'
    - 'cztery'
    - 'pięć'
    - 'sześć'
    - 'siedem'
    - 'osiem'
    - 'dziewięć'
    - 'dziesięć'
    - 'jedenaście'
    - 'dwanaście'
    - 'trzynaście'
    - 'czternaście'
    - 'piętnaście'
    - 'szesnaście'
    - 'siedemnaście'
    - 'osiemnaście'
    - 'dziewiętnaście'
  tensMap:
    - 'zero'
    - 'dziesięć'
    - 'dwadzieścia'
    - 'trzydzieści'
    - 'czterdzieści'
    - 'pięćdziesiąt'
    - 'sześćdziesiąt'
    - 'siedemdziesiąt'
    - 'osiemdziesiąt'
    - 'dziewięćdziesiąt'
  hundredsMap:
    - 'zero'
    - 'sto'
    - 'dwieście'
    - 'trzysta'
    - 'czterysta'
    - 'pięćset'
    - 'sześćset'
    - 'siedemset'
    - 'osiemset'
    - 'dziewięćset'
  scales:
    -
      value: 1000000000000000000
      countGender: 'masculine'
      singular: 'trylion'
      paucal: 'tryliony'
      plural: 'trylionów'
    -
      value: 1000000000000000
      countGender: 'masculine'
      singular: 'biliard'
      paucal: 'biliardy'
      plural: 'biliardów'
    -
      value: 1000000000000
      countGender: 'masculine'
      singular: 'bilion'
      paucal: 'biliony'
      plural: 'bilionów'
    -
      value: 1000000000
      countGender: 'masculine'
      singular: 'miliard'
      paucal: 'miliardy'
      plural: 'miliardów'
    -
      value: 1000000
      countGender: 'masculine'
      singular: 'milion'
      paucal: 'miliony'
      plural: 'milionów'
    -
      value: 1000
      countGender: 'masculine'
      singular: 'tysiąc'
      paucal: 'tysiące'
      plural: 'tysięcy'
ordinalizer:
  engine: 'suffix'
  masculineSuffix: '.'
wordsToNumber:
  engine: 'token-map'
  normalizationProfile: 'LowercaseRemovePeriods'
  cardinalMap:
    zero: 0
    jeden: 1
    jedna: 1
    jedno: 1
