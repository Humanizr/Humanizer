        'еден': 1
        'една': 1
        'едно': 1
        'два': 2
        'две': 2
        'три': 3
        'четири': 4
        'пет': 5
        'шест': 6
        'седум': 7
        'осум': 8
        'девет': 9
        'десет': 10
        'единаесет': 11
