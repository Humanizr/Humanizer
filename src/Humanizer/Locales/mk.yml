locale: 'mk'

surfaces:
  list:
    engine: 'conjunction'
    value: 'и'

  formatter:
    engine: 'profiled'
    dataUnitDetector: 'singular-plural'
    dataUnitSuffixes:
      singular: '_Singular'
      plural: '_Plural'
    dataUnitFallbackTransform: 'trim-trailing-s'
    timeUnitGenders:
      millisecond: 'feminine'
      second: 'feminine'
      minute: 'feminine'
      hour: 'masculine'
      day: 'masculine'
      week: 'feminine'
      month: 'masculine'
      year: 'feminine'

  phrases:
    relativeDate:
      now: 'сега'
      never: 'никогаш'
      past:
        millisecond:
          single: 'пред милисекунда'
          multiple:
            forms:
              default: 'милисекунди'
            beforeCount: 'пред'
        second:
          single: 'пред секунда'
          multiple:
            forms:
              default: 'секунди'
            beforeCount: 'пред'
        minute:
          single: 'пред минута'
          multiple:
            forms:
              default: 'минути'
            beforeCount: 'пред'
        hour:
          single: 'пред еден час'
          multiple:
            forms:
              default: 'часа'
            beforeCount: 'пред'
        day:
          single: 'вчера'
          multiple:
            forms:
              default: 'дена'
            beforeCount: 'пред'
          template:
            name: 'two'
            value: 'пред 2 дена'
        week:
          single: 'пред една недела'
          multiple:
            forms:
              default: 'недели'
            beforeCount: 'пред'
        month:
          single: 'пред еден месец'
          multiple:
            forms:
              default: 'месеци'
              plural: 'месеца'
            beforeCount: 'пред'
        year:
          single: 'пред една година'
          multiple:
            forms:
              default: 'години'
            beforeCount: 'пред'
      future:
        millisecond:
          single: 'за милисекунда'
          multiple:
            forms:
              default: 'милисекунди'
            beforeCount: 'за'
        second:
          single: 'за секунда'
          multiple:
            forms:
              default: 'секунди'
            beforeCount: 'за'
        minute:
          single: 'за минута'
          multiple:
            forms:
              default: 'минути'
            beforeCount: 'за'
        hour:
          single: 'за еден час'
          multiple:
            forms:
              default: 'часа'
            beforeCount: 'за'
        day:
          single: 'утре'
          multiple:
            forms:
              default: 'дена'
            beforeCount: 'за'
          template:
            name: 'two'
            value: 'за 2 дена'
        week:
          single: 'за една недела'
          multiple:
            forms:
              default: 'недели'
            beforeCount: 'за'
        month:
          single: 'за еден месец'
          multiple:
            forms:
              default: 'месеци'
              plural: 'месеца'
            beforeCount: 'за'
        year:
          single: 'за една година'
          multiple:
            forms:
              default: 'години'
            beforeCount: 'за'
    duration:
      zero: 'нема време'
      age:
        template: '{value}'
      millisecond:
        single:
          numeric: '1 милисекунда'
          words: 'една милисекунда'
        multiple:
          forms:
            default: 'милисекунди'
      second:
        single:
          numeric: '1 секунда'
          words: 'една секунда'
        multiple:
          forms:
            default: 'секунди'
      minute:
        single:
          numeric: '1 минута'
          words: 'една минута'
        multiple:
          forms:
            default: 'минути'
      hour:
        single:
          numeric: '1 час'
          words: 'еден час'
        multiple:
          forms:
            default: 'часа'
      day:
        single:
          numeric: '1 ден'
          words: 'еден ден'
        multiple:
          forms:
            default: 'дена'
      week:
        single:
          numeric: '1 недела'
          words: 'една недела'
        multiple:
          forms:
            default: 'недели'
      month:
        single:
          numeric: '1 месец'
          words: 'еден месец'
        multiple:
          forms:
            default: 'месеци'
            plural: 'месеца'
      year:
        single:
          numeric: '1 година'
          words: 'една година'
        multiple:
          forms:
            default: 'години'
    dataUnits:
      bit:
        forms:
          default: 'битови'
          singular: 'бит'
        symbol: 'b'
      byte:
        forms:
          default: 'бајти'
          singular: 'бајт'
        symbol: 'B'
      kilobyte:
        forms:
          default: 'килобајти'
          singular: 'килобајт'
        symbol: 'KB'
      megabyte:
        forms:
          default: 'мегабајти'
          singular: 'мегабајт'
        symbol: 'MB'
      gigabyte:
        forms:
          default: 'гигабајти'
          singular: 'гигабајт'
        symbol: 'GB'
      terabyte:
        forms:
          default: 'терабајти'
          singular: 'терабајт'
        symbol: 'TB'
    timeUnits:
      millisecond:
        symbol: 'мс'
      second:
        symbol: 'сек.'
      minute:
        symbol: 'мин.'
      hour:
        symbol: 'ч.'
      day:
        symbol: 'д.'
      week:
        symbol: 'нед.'
      month:
        symbol: 'мес.'
      year:
        symbol: 'г.'

  number:
    words:
      engine: 'macedonian'
      useCulture: true
    parse:
      engine: 'token-map'
      normalizationProfile: 'LowercaseReplacePeriodsWithSpaces'
      cardinalMap:
