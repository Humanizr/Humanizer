        'дваесетто': 20
        'триесетти': 30
        'триесетта': 30
        'триесетто': 30
        'четириесетти': 40
        'четириесетта': 40
        'четириесетто': 40
        'педесетти': 50
        'педесетта': 50
        'педесетто': 50
        'шеесетти': 60
        'шеесетта': 60
