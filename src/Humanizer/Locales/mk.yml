        'милионито': 1000000
        'милијардити': 1000000000
        'милијардита': 1000000000
        'милијардито': 1000000000
        'трилионити': 1000000000000
        'трилионита': 1000000000000
        'трилионито': 1000000000000
      allowTerminalOrdinalToken: true
      allowInvariantIntegerInput: true
      negativePrefixes:
        - 'минус '
      ignoredTokens:
        - 'и'

  ordinal:
    numeric:
      engine: 'suffix'
      masculineSuffix: '.'
      feminineSuffix: '.'
      neuterSuffix: '.'
    date:
      engine: 'pattern'
      pattern: "{day} MMMM yyyy 'г.'"
      dayMode: 'Numeric'
    dateOnly:
      engine: 'pattern'
      pattern: "{day} MMMM yyyy 'г.'"
      dayMode: 'Numeric'

  clock:
    engine: 'phrase-clock'
    hourMode: 'h24'
    hourGender: 'masculine'
    minuteGender: 'feminine'
    midnight: 'полноќ'
    midday: 'пладне'
    hourSuffixSingular: 'часот'
    hourSuffixPlural: 'часот'
    minuteSuffixSingular: 'минута'
    minuteSuffixPlural: 'минути'
    min0: '{hour}'
    defaultTemplate: '{hour} и {minutes} {minuteSuffix}'

  compass:
    full:
      - 'север'
      - 'север-североисток'
      - 'североисток'
      - 'исток-североисток'
      - 'исток'
      - 'исток-југоисток'
      - 'југоисток'
      - 'југ-југоисток'
      - 'југ'
      - 'југ-југозапад'
      - 'југозапад'
      - 'запад-југозапад'
      - 'запад'
      - 'запад-северозапад'
      - 'северозапад'
      - 'север-северозапад'
    short:
      - 'С'
      - 'ССИ'
      - 'СИ'
      - 'ИСИ'
      - 'И'
      - 'ИЈИ'
      - 'ЈИ'
      - 'ЈЈИ'
      - 'Ј'
      - 'ЈЈЗ'
      - 'ЈЗ'
      - 'ЗЈЗ'
      - 'З'
