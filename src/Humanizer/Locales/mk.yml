        'квинтилиони': 1000000000000000000
      ordinalMap:
        'нулти': 0
        'нулта': 0
        'нулто': 0
        'прв': 1
        'прва': 1
        'прво': 1
        'втор': 2
        'втора': 2
        'второ': 2
        'трет': 3
        'трета': 3
        'трето': 3
        'четврти': 4
        'четврта': 4
        'четврто': 4
        'петти': 5
        'петта': 5
        'петто': 5
        'шести': 6
