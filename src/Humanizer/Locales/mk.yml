        'дванаесетти': 12
        'дванаесетта': 12
        'дванаесетто': 12
        'тринаесетти': 13
        'тринаесетта': 13
        'тринаесетто': 13
        'четиринаесетти': 14
        'четиринаесетта': 14
        'четиринаесетто': 14
        'петнаесетти': 15
        'петнаесетта': 15
        'петнаесетто': 15
        'шеснаесетти': 16
