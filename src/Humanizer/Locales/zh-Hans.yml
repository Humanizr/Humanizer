locale: 'zh-Hans'

surfaces:
  list:
    engine: 'delimited'
    value: '、'

  formatter:
    engine: 'profiled'
    dataUnitFallbackTransform: 'trim-trailing-s'

  phrases:
    relativeDate:
      now: '现在'
      never: '从不'
      past:
        millisecond:
          single: '1 毫秒前'
          multiple:
            forms:
              default: '毫秒前'
        second:
          single: '1 秒钟前'
          multiple:
            forms:
              default: '秒钟前'
        minute:
          single: '1 分钟前'
          multiple:
            forms:
              default: '分钟前'
        hour:
          single: '1 小时前'
          multiple:
            forms:
              default: '小时前'
        day:
          single: '昨天'
          multiple:
            forms:
              default: '天前'
          template:
            name: 'two'
            value: '前天'
        week:
          single: '1 周前'
          multiple:
            forms:
              default: '周前'
        month:
          single: '1 个月前'
          multiple:
            forms:
              default: '个月前'
        year:
          single: '去年'
          multiple:
            forms:
              default: '年前'
      future:
        millisecond:
          single: '1 毫秒后'
          multiple:
            forms:
              default: '毫秒后'
        second:
          single: '1 秒钟后'
          multiple:
            forms:
              default: '秒钟后'
        minute:
          single: '1 分钟后'
          multiple:
            forms:
              default: '分钟后'
        hour:
          single: '1 小时后'
          multiple:
            forms:
              default: '小时后'
        day:
          single: '明天'
          multiple:
            forms:
              default: '天后'
          template:
            name: 'two'
            value: '后天'
        week:
          single: '1 周后'
          multiple:
            forms:
              default: '周后'
        month:
          single: '1 个月后'
          multiple:
            forms:
              default: '个月后'
        year:
          single: '明年'
          multiple:
            forms:
              default: '年后'
    duration:
      zero: '没有时间'
      age:
        template: '{value} 岁'
      millisecond:
        single:
          numeric: '1 毫秒'
          words: 'one 毫秒'
        multiple:
          forms:
            default: '毫秒'
      second:
        single:
          numeric: '1 秒'
          words: 'one 秒'
        multiple:
          forms:
            default: '秒'
      minute:
        single:
          numeric: '1 分'
          words: 'one 分'
        multiple:
          forms:
            default: '分'
      hour:
        single:
          numeric: '1 小时'
          words: 'one 小时'
        multiple:
          forms:
            default: '小时'
      day:
        single:
          numeric: '1 天'
          words: 'one 天'
        multiple:
          forms:
            default: '天'
      week:
        single:
          numeric: '1 周'
          words: 'one 周'
        multiple:
          forms:
            default: '周'
      month:
        single:
          numeric: '1 个月'
          words: 'one 个月'
        multiple:
          forms:
            default: '个月'
      year:
        single:
          numeric: '1 年'
          words: 'one 年'
        multiple:
          forms:
            default: '年'
    dataUnits:
      bit:
        forms:
          default: '比特'
        symbol: 'b'
      byte:
        forms:
          default: '字节'
        symbol: 'B'
      kilobyte:
        forms:
          default: '千字节'
        symbol: 'KB'
      megabyte:
        forms:
          default: '兆字节'
        symbol: 'MB'
      gigabyte:
        forms:
          default: '吉字节'
        symbol: 'GB'
      terabyte:
        forms:
          default: '太字节'
        symbol: 'TB'
    timeUnits:
      millisecond:
        symbol: '毫秒'
      second:
        symbol: '秒'
      minute:
        symbol: '分'
      hour:
        symbol: '小时'
      day:
        symbol: '天'
      week:
        symbol: '周'
      month:
        symbol: '月'
      year:
        symbol: '年'

  number:
    words:
      engine: 'east-asian-grouped'
      zeroWord: '零'
      negativePrefix: '负 '
      ordinalPrefix: '第 '
      digitWords:
        - '零'
        - '一'
        - '二'
        - '三'
        - '四'
        - '五'
        - '六'
        - '七'
        - '八'
        - '九'
      smallUnitWords:
        1: '十'
        2: '百'
        3: '千'
      largeUnits:
        1: '万'
        2: '亿'
        3: '兆'
        4: '京'
      omitOneBeforeTen: true
      omitOneBeforeTenOnlyWhenLeading: true
      omitOneBeforeHundred: false
      omitOneBeforeThousand: false
      insertZeroInGroup: true
      insertZeroBetweenGroups: true

    parse:
      engine: 'east-asian-positional'
      negativePrefixes:
        - '负'
      ordinalPrefix: '第'
      digits:
        '零': 0
        '一': 1
        '二': 2
        '三': 3
        '四': 4
        '五': 5
        '六': 6
        '七': 7
        '八': 8
        '九': 9
      smallUnits:
        '十': 10
        '百': 100
        '千': 1000
      largeUnits:
        '万': 10000
        '亿': 100000000
        '兆': 1000000000000
        '京': 10000000000000000

  compass:
    full:
      - '北'
      - '北东北'
      - '东北'
      - '东北东'
      - '东'
      - '东南东'
      - '东南'
      - '南东南'
      - '南'
      - '南西南'
      - '西南'
      - '西南西'
      - '西'
      - '西北西'
      - '西北'
      - '北西北'
    short:
      - '北'
      - '北东北'
      - '东北'
      - '东北东'
      - '东'
      - '东南东'
      - '东南'
      - '南东南'
      - '南'
      - '南西南'
      - '西南'
      - '西南西'
      - '西'
      - '西北西'
      - '西北'
      - '北西北'

  ordinal:
    numeric:
      engine: 'template'
      masculine:
        prefix: '第'
        defaultSuffix: ''
