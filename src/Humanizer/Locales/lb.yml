locale: 'lb'

surfaces:
  list:
    engine: 'conjunction'
    value: 'an'

  formatter:
    engine: 'profiled'
    exactDateForms:
      -
        number: 2
        form: 'dual'
        units:
          - 'day'
        tenses:
          - 'past'
          - 'future'
    dataUnitFallbackTransform: 'trim-trailing-s'
    secondaryPlaceholderMode: 'luxembourgish-eifeler-n'
    timeUnitGenders:
      millisecond: 'feminine'
      second: 'feminine'
      minute: 'feminine'
      hour: 'feminine'
      day: 'masculine'
      week: 'feminine'
      month: 'masculine'
      year: 'masculine'

  phrases:
    relativeDate:
      now: 'elo'
      never: 'ni'
      past:
        millisecond:
          single: 'virun enger Millisekonn'
          multiple:
            forms:
              default: 'Millisekonnen'
            beforeCount: 'viru{prep}'
        second:
          single: 'virun enger Sekonn'
          multiple:
            forms:
              default: 'Sekonnen'
            beforeCount: 'viru{prep}'
        minute:
          single: 'virun enger Minutt'
          multiple:
            forms:
              default: 'Minutten'
            beforeCount: 'viru{prep}'
        hour:
          single: 'virun enger Stonn'
          multiple:
            forms:
              default: 'Stonnen'
            beforeCount: 'viru{prep}'
        day:
          single: 'gëschter'
          multiple:
            countPlacement: none
            forms:
              default: 'viru{prep} {count} Deeg'
              singular: 'virun engem Dag'
              dual: 'virgëschter'
              plural: 'virgëschter'
          template:
            name: 'two'
            value: 'virgëschter'
        week:
          single: 'virun enger Woch'
          multiple:
            forms:
              default: 'Wochen'
            beforeCount: 'viru{prep}'
        month:
          single: 'virun engem Mount'
          multiple:
            forms:
              default: 'Méint'
            beforeCount: 'viru{prep}'
        year:
          single: 'virun engem Joer'
          multiple:
            forms:
              default: 'Joer'
            beforeCount: 'viru{prep}'
      future:
        millisecond:
          single: 'an enger Millisekonn'
          multiple:
            forms:
              default: 'Millisekonnen'
            beforeCount: 'a{prep}'
        second:
          single: 'an enger Sekonn'
          multiple:
            forms:
              default: 'Sekonnen'
            beforeCount: 'a{prep}'
        minute:
          single: 'an enger Minutt'
          multiple:
            forms:
              default: 'Minutten'
            beforeCount: 'a{prep}'
        hour:
          single: 'an enger Stonn'
          multiple:
            forms:
              default: 'Stonnen'
            beforeCount: 'a{prep}'
        day:
          single: 'muer'
          multiple:
            countPlacement: none
            forms:
              default: 'a{prep} {count} Deeg'
              singular: 'iwwermuer'
              dual: 'iwwermuer'
              plural: 'iwwermuer'
          template:
            name: 'two'
            value: 'iwwermuer'
        week:
          single: 'an enger Woch'
          multiple:
            forms:
              default: 'Wochen'
            beforeCount: 'a{prep}'
        month:
          single: 'an engem Mount'
          multiple:
            forms:
              default: 'Méint'
            beforeCount: 'a{prep}'
        year:
          single: 'an engem Joer'
          multiple:
            forms:
              default: 'Joer'
            beforeCount: 'a{prep}'
