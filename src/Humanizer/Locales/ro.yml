        multiple:
          countPlacement: none
          forms:
            default: 'peste {count}{prep} ani'
  timeSpan:
    zero: '0 secunde'
    age:
      template: '{value}'
    millisecond:
      single:
        numeric: '1 milisecundă'
        words: 'one milisecundă'
      multiple:
        countPlacement: none
        forms:
          default: '{count}{prep} milisecunde'
    second:
