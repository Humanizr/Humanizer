locale: 'fr-CH'
variantOf: 'fr'

surfaces:
  number:
    words:
      engine: 'variant-decade'
      minusWord: 'moins'
      seventyStrategy: 'regular'
      ninetyStrategy: 'regular'
      pluralizeExactEighty: false
      tensUsingEtWhenUnitIsOne:
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
        - 8
        - 9
      tensMap:
        - 'zéro'
        - 'dix'
        - 'vingt'
        - 'trente'
        - 'quarante'
        - 'cinquante'
        - 'soixante'
        - 'septante'
        - 'octante'
        - 'nonante'
    formatting:
      decimalSeparator: '.'
