      never: 'ba a taɓa ba'
      past:
        millisecond:
          single: 'milisakan 1 da ya wuce'
          multiple:
            forms:
              default: 'milisakan'
            template: '{count} milisakan da suka wuce'
        second:
          single: 'sakan 1 da ya wuce'
          multiple:
            forms:
              default: 'sakan'
            template: '{count} sakan da suka wuce'
        minute:
          single: 'minti 1 da ya wuce'
          multiple:
            forms:
              default: 'mintuna'
            template: '{count} mintuna da suka wuce'
        hour:
          single: 'sa''a 1 da ta wuce'
          multiple:
            forms:
              default: 'sa''o''i'
            template: '{count} sa''o''i da suka wuce'
        day:
          single: 'jiya'
          multiple:
            forms:
              default: 'kwanaki'
            template: '{count} kwanaki da suka wuce'
        week:
          single: 'mako 1 da ya wuce'
          multiple:
            forms:
              default: 'makonni'
            template: '{count} makonni da suka wuce'
        month:
          single: 'wata 1 da ya wuce'
          multiple:
            forms:
              default: 'watanni'
            template: '{count} watanni da suka wuce'
        year:
          single: 'shekara 1 da ta wuce'
          multiple:
            forms:
              default: 'shekaru'
            template: '{count} shekaru da suka wuce'
      future:
        millisecond:
          single: 'nan da milisakan 1'
          multiple:
            forms:
              default: 'milisakan'
            template: 'nan da milisakan {count}'
        second:
          single: 'nan da sakan 1'
          multiple:
            forms:
              default: 'sakan'
            template: 'nan da sakan {count}'
        minute:
          single: 'nan da minti 1'
          multiple:
            forms:
              default: 'mintuna'
            template: 'nan da mintuna {count}'
        hour:
          single: 'nan da sa''a 1'
          multiple:
            forms:
              default: 'sa''o''i'
            template: 'nan da sa''o''i {count}'
        day:
          single: 'gobe'
          multiple:
            forms:
              default: 'kwanaki'
            template: 'nan da kwanaki {count}'
        week:
          single: 'nan da mako 1'
          multiple:
            forms:
              default: 'makonni'
            template: 'nan da makonni {count}'
        month:
          single: 'nan da wata 1'
          multiple:
            forms:
              default: 'watanni'
            template: 'nan da watanni {count}'
        year:
          single: 'nan da shekara 1'
          multiple:
            forms:
              default: 'shekaru'
            template: 'nan da shekaru {count}'
