      zero: 'babu lokaci'
      age:
        template: '{value}'
      millisecond:
        single:
          numeric: 'milisakan 1'
          words: 'milisakan ɗaya'
        multiple:
          countPlacement: 'after-form'
          forms:
            default: 'milisakan'
      second:
