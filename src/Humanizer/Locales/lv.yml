      never: 'nekad'
      past:
        millisecond:
          single: 'pirms milisekundes'
          multiple:
            forms:
              default: 'milisekundēm'
            beforeCount: 'pirms'
        second:
          single: 'pirms sekundes'
          multiple:
            forms:
              default: 'sekundēm'
              singular: 'sekundes'
            beforeCount: 'pirms'
        minute:
          single: 'pirms minūtes'
          multiple:
            forms:
              default: 'minūtēm'
              singular: 'minūtes'
            beforeCount: 'pirms'
        hour:
          single: 'pirms stundas'
          multiple:
            forms:
              default: 'stundām'
              singular: 'stundas'
            beforeCount: 'pirms'
        day:
          single: 'vakardien'
          multiple:
            forms:
              default: 'dienām'
              singular: 'dienas'
            beforeCount: 'pirms'
          template:
            name: 'two'
            value: 'pirms 2 dienām'
        week:
          single: 'pirms nedēļas'
          multiple:
            forms:
              default: 'nedēļām'
            beforeCount: 'pirms'
        month:
          single: 'pirms mēneša'
          multiple:
            forms:
              default: 'mēnešiem'
              singular: 'mēneša'
            beforeCount: 'pirms'
        year:
          single: 'pirms gada'
          multiple:
            forms:
              default: 'gadiem'
              singular: 'gada'
            beforeCount: 'pirms'
      future:
        millisecond:
          single: 'pēc milisekundes'
          multiple:
            forms:
              default: 'milisekundēm'
            beforeCount: 'pēc'
        second:
          single: 'pēc sekundes'
          multiple:
            forms:
              default: 'sekundēm'
              singular: 'sekundes'
            beforeCount: 'pēc'
        minute:
          single: 'pēc minūtes'
          multiple:
            forms:
              default: 'minūtēm'
              singular: 'minūtes'
            beforeCount: 'pēc'
        hour:
          single: 'pēc stundas'
          multiple:
            forms:
              default: 'stundām'
              singular: 'stundas'
            beforeCount: 'pēc'
        day:
          single: 'rītdien'
          multiple:
            forms:
              default: 'dienām'
              singular: 'dienas'
            beforeCount: 'pēc'
          template:
            name: 'two'
            value: 'pēc 2 dienām'
        week:
          single: 'pēc nedēļas'
          multiple:
            forms:
              default: 'nedēļām'
            beforeCount: 'pēc'
        month:
          single: 'pēc mēneša'
          multiple:
            forms:
              default: 'mēnešiem'
              singular: 'mēneša'
            beforeCount: 'pēc'
        year:
          single: 'pēc gada'
          multiple:
            forms:
              default: 'gadiem'
              singular: 'gada'
            beforeCount: 'pēc'
    duration:
      zero: 'bez laika'
      age:
        template: '{value}'
      millisecond:
