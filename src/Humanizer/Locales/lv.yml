# Locale-owned generator data for lv.
# Omit a feature to inherit it from the parent locale.
# Inline mappings below are the source of truth for generated profiles and token-map lexicons.
collectionFormatter:
  engine: 'conjunction'
  value: 'un'
formatter:
  engine: 'profiled'
  dataUnitFallbackTransform: 'latvian'
numberToWords:
  engine: 'terminal-ordinal-scale'
  zeroWord: 'nulle'
  minusWord: 'mīnus'
  unitStems:
    1: 'vien'
    2: 'div'
    3: 'trīs'
    4: 'četr'
    5: 'piec'
    6: 'seš'
    7: 'septiņ'
    8: 'astoņ'
    9: 'deviņ'
    10: 'desmit'
    11: 'vienpadsmit'
    12: 'divpadsmit'
    13: 'trīspadsmit'
    14: 'četrpadsmit'
    15: 'piecpadsmit'
    16: 'sešpadsmit'
    17: 'septiņpadsmit'
    18: 'astoņpadsmit'
    19: 'deviņpadsmit'
  ordinalUnitStems:
    1: 'pirm'
    2: 'otr'
    3: 'treš'
    4: 'ceturt'
    5: 'piekt'
    6: 'sest'
    7: 'septīt'
    8: 'astot'
    9: 'devīt'
    10: 'desmit'
    11: 'vienpadsmit'
    12: 'divpadsmit'
    13: 'trīspadsmit'
    14: 'četrpadsmit'
    15: 'piecpadsmit'
    16: 'sešpadsmit'
    17: 'septiņpadsmit'
    18: 'astoņpadsmit'
    19: 'deviņpadsmit'
  tensMap:
    1: 'desmit'
    2: 'divdesmit'
    3: 'trīsdesmit'
    4: 'četrdesmit'
    5: 'piecdesmit'
    6: 'sešdesmit'
    7: 'septiņdesmit'
    8: 'astoņdesmit'
    9: 'deviņdesmit'
  hundredsExactStems:
    1: 'simt'
    2: 'divsimt'
    3: 'trīssimt'
    4: 'četrsimt'
    5: 'piecsimt'
    6: 'sešsimt'
    7: 'septiņsimt'
    8: 'astoņsimt'
    9: 'deviņsimt'
  exactOneHundredCardinal: 'simts'
  exactOneHundredAfterHigherScale: 'viens simts'
  oneHundredWithRemainder: 'simtu'
  hundredsPluralWord: 'simti'
  masculineOrdinalSuffix: 'ais'
  feminineOrdinalSuffix: 'ā'
  scales:
    -
      value: 1000000
      exactSingularCardinal: 'miljons'
      singularWithRemainderCardinal: 'viens miljons'
      pluralCardinal: 'miljoni'
      ordinalStem: 'miljon'
    -
      value: 1000
      exactSingularCardinal: 'tūkstotis'
      singularWithRemainderCardinal: 'tūkstoš'
      pluralCardinal: 'tūkstoši'
      ordinalStem: 'tūkstoš'
ordinalizer:
  engine: 'suffix'
  masculineSuffix: '.'
dateToOrdinalWords:
  pattern: '{day} MMMM yyyy'
  dayMode: 'DotSuffix'
dateOnlyToOrdinalWords:
  pattern: '{day} MMMM yyyy'
  dayMode: 'DotSuffix'
wordsToNumber:
  engine: 'token-map'
  normalizationProfile: 'LowercaseRemovePeriods'
