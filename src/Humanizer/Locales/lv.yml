          words: 'one minūte'
        multiple:
          forms:
            default: 'minūtes'
            singular: 'minūte'
      hour:
        single:
          numeric: '1 stunda'
          words: 'one stunda'
        multiple:
          forms:
            default: 'stundas'
            singular: 'stunda'
      day:
        single:
          numeric: '1 diena'
          words: 'one diena'
        multiple:
          forms:
            default: 'dienas'
            singular: 'diena'
      week:
        single:
          numeric: '1 nedēļa'
          words: 'one nedēļa'
        multiple:
          forms:
            default: 'nedēļas'
            singular: 'nedēļa'
      month:
        single:
          numeric: '1 mēnesis'
          words: 'one mēnesis'
        multiple:
          forms:
            default: 'mēneši'
      year:
        single:
          numeric: '1 gads'
          words: 'one gads'
        multiple:
          forms:
            default: 'gadi'
