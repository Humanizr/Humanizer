      value: 1000000000000000000
      gender: 'masculine'
      oneForm: 'trilijun'
      singular: 'trilijun'
      paucal: 'trilijuna'
      plural: 'trilijuna'
    -
      value: 1000000000000000
      gender: 'feminine'
