locale: 'hr'

surfaces:
  list:
    engine: 'conjunction'
    value: 'i'

  formatter:
    engine: 'profiled'
    resourceKeyDetector: 'south-slavic'
    resourceKeySuffixes:
      paucal: '_Paucal'
    dataUnitDetector: 'south-slavic'
    dataUnitSuffixes:
      singular: '_Singular'
      paucal: '_Paucal'
    dataUnitFallbackTransform: 'trim-trailing-s'

  phrases:
    relativeDate:
      now: 'upravo sada'
      never: 'nikada'
      past:
        millisecond:
          single: 'prije jedne milisekunde'
          multiple:
            forms:
              default: 'milisekundi'
            beforeCount: 'prije'
        second:
          single: 'prije jedne sekunde'
          multiple:
            forms:
              default: 'sekundi'
              singular: 'sekunde'
              dual: 'sekunde'
              paucal: 'sekunde'
              plural: 'sekunde'
            beforeCount: 'prije'
        minute:
          single: 'prije jedne minute'
          multiple:
            forms:
              default: 'minuta'
              singular: 'minute'
              dual: 'minute'
              paucal: 'minute'
              plural: 'minute'
            beforeCount: 'prije'
        hour:
          single: 'prije sat vremena'
          multiple:
            forms:
              default: 'sati'
              singular: 'sata'
              dual: 'sata'
              paucal: 'sata'
              plural: 'sata'
            beforeCount: 'prije'
        day:
          single: 'jučer'
          multiple:
            forms:
              default: 'dana'
            beforeCount: 'prije'
          template:
            name: 'two'
            value: 'prije 2 dana'
        week:
          single: 'prije tjedan dana'
          multiple:
            forms:
              default: 'tjedana'
            beforeCount: 'prije'
        month:
          single: 'prije mjesec dana'
          multiple:
            forms:
              default: 'mjeseci'
              singular: 'mjeseca'
              dual: 'mjeseca'
              paucal: 'mjeseca'
              plural: 'mjeseca'
            beforeCount: 'prije'
        year:
          single: 'prije godinu dana'
          multiple:
            forms:
              default: 'godina'
              singular: 'godine'
              dual: 'godine'
              paucal: 'godine'
              plural: 'godine'
            beforeCount: 'prije'
      future:
        millisecond:
          single: 'za jednu milisekundu'
          multiple:
            forms:
              default: 'milisekundi'
            beforeCount: 'za'
        second:
          single: 'za jednu sekundu'
          multiple:
            forms:
              default: 'sekundi'
              singular: 'sekunde'
              dual: 'sekunde'
              paucal: 'sekunde'
              plural: 'sekunde'
            beforeCount: 'za'
        minute:
          single: 'za jednu minutu'
          multiple:
            forms:
              default: 'minuta'
              singular: 'minute'
              dual: 'minute'
              paucal: 'minute'
              plural: 'minute'
            beforeCount: 'za'
        hour:
          single: 'za sat vremena'
          multiple:
            forms:
              default: 'sati'
              singular: 'sata'
              dual: 'sata'
              paucal: 'sata'
              plural: 'sata'
            beforeCount: 'za'
        day:
          single: 'sutra'
          multiple:
            forms:
              default: 'dana'
            beforeCount: 'za'
          template:
            name: 'two'
            value: 'za 2 dana'
        week:
          single: 'za tjedan dana'
          multiple:
            forms:
              default: 'tjedana'
            beforeCount: 'za'
        month:
          single: 'za mjesec dana'
          multiple:
            forms:
              default: 'mjeseci'
              singular: 'mjeseca'
              dual: 'mjeseca'
              paucal: 'mjeseca'
              plural: 'mjeseca'
            beforeCount: 'za'
        year:
          single: 'za godinu dana'
          multiple:
            forms:
              default: 'godina'
              singular: 'godine'
              dual: 'godine'
              paucal: 'godine'
              plural: 'godine'
            beforeCount: 'za'
    duration:
      zero: 'bez vremena'
      age:
        template: '{value}'
      millisecond:
        single:
          numeric: '1 milisekunda'
          words: 'one milisekunda'
        multiple:
          forms:
            default: 'milisekundi'
            singular: 'milisekunde'
            dual: 'milisekunde'
            paucal: 'milisekunde'
            plural: 'milisekunde'
      second:
        single:
          numeric: '1 sekunda'
          words: 'one sekunda'
        multiple:
          forms:
            default: 'sekundi'
            singular: 'sekunde'
            dual: 'sekunde'
            paucal: 'sekunde'
            plural: 'sekunde'
      minute:
        single:
          numeric: '1 minuta'
          words: 'one minuta'
        multiple:
          forms:
            default: 'minuta'
            singular: 'minute'
            dual: 'minute'
            paucal: 'minute'
            plural: 'minute'
      hour:
        single:
          numeric: '1 sat'
          words: 'one sat'
        multiple:
          forms:
            default: 'sati'
            singular: 'sata'
            dual: 'sata'
            paucal: 'sata'
            plural: 'sata'
      day:
        single:
          numeric: '1 dan'
          words: 'one dan'
        multiple:
          forms:
            default: 'dana'
      week:
        single:
          numeric: '1 tjedan'
          words: 'one tjedan'
        multiple:
          forms:
            default: 'tjedana'
            singular: 'tjedna'
            dual: 'tjedna'
            paucal: 'tjedna'
            plural: 'tjedna'
      month:
        single:
          numeric: '1 mjesec'
          words: 'one mjesec'
        multiple:
          forms:
            default: 'mjeseci'
            singular: 'mjeseca'
            dual: 'mjeseca'
            paucal: 'mjeseca'
            plural: 'mjeseca'
      year:
        single:
          numeric: '1 godina'
          words: 'one godina'
        multiple:
          forms:
            default: 'godina'
            singular: 'godine'
            dual: 'godine'
            paucal: 'godine'
            plural: 'godine'
    dataUnits:
      bit:
        forms:
          default: 'bitova'
        symbol: 'b'
      byte:
        forms:
          default: 'bajtova'
          singular: 'bajt'
          paucal: 'bajta'
        symbol: 'B'
      kilobyte:
        forms:
          default: 'kilobajtova'
          singular: 'kilobajt'
          paucal: 'kilobajta'
        symbol: 'KB'
      megabyte:
        forms:
          default: 'megabajtova'
          singular: 'megabajt'
          paucal: 'megabajta'
        symbol: 'MB'
      gigabyte:
        forms:
          default: 'gigabajtova'
          singular: 'gigabajt'
          paucal: 'gigabajta'
        symbol: 'GB'
      terabyte:
        forms:
          default: 'terabajtova'
          singular: 'terabajt'
          paucal: 'terabajta'
        symbol: 'TB'
    timeUnits:
      millisecond:
        symbol: 'ms'
      second:
        symbol: 's'
      minute:
        symbol: 'min'
      hour:
        symbol: 'sat'
      day:
        symbol: 'dan'
      week:
        symbol: 'tjedan'
      month:
        symbol: 'mjesec'
      year:
        symbol: 'godina'

  number:
    words:
      engine: 'south-slavic-cardinal'
      useCulture: true
      maximumValue: 9223372036854775807
      allowLongMin: true
      zeroWord: 'nula'
      minusWord: 'minus'
      unitsMap:
        - 'nula'
        - 'jedan'
        - 'dva'
        - 'tri'
        - 'četiri'
        - 'pet'
        - 'šest'
        - 'sedam'
        - 'osam'
        - 'devet'
        - 'deset'
        - 'jedanaest'
        - 'dvanaest'
        - 'trinaest'
        - 'četrnaest'
        - 'petnaest'
        - 'šesnaest'
        - 'sedamnaest'
        - 'osamnaest'
        - 'devetnaest'
      tensMap:
        - 'nula'
        - 'deset'
        - 'dvadeset'
        - 'trideset'
        - 'četrdeset'
        - 'pedeset'
        - 'šezdeset'
        - 'sedamdeset'
        - 'osamdeset'
        - 'devedeset'
      hundredsMap:
        - 'nula'
        - 'sto'
        - 'dvjesto'
        - 'tristo'
        - 'četiristo'
        - 'petsto'
        - 'šeststo'
        - 'sedamsto'
        - 'osamsto'
        - 'devetsto'
      feminineOne: 'jedna'
      feminineTwo: 'dvije'
      scales:
        -
          value: 1000000000000000000
          gender: 'masculine'
          oneForm: 'trilijun'
          singular: 'trilijun'
          paucal: 'trilijuna'
          plural: 'trilijuna'
        -
          value: 1000000000000000
          gender: 'feminine'
          oneForm: 'bilijarda'
          singular: 'bilijarda'
          paucal: 'bilijarde'
          plural: 'bilijardi'
        -
          value: 1000000000000
          gender: 'masculine'
          oneForm: 'bilijun'
          singular: 'bilijun'
          paucal: 'bilijuna'
          plural: 'bilijuna'
        -
          value: 1000000000
          gender: 'feminine'
          oneForm: 'milijarda'
          singular: 'milijarda'
          paucal: 'milijarde'
          plural: 'milijardi'
        -
          value: 1000000
          gender: 'masculine'
          oneForm: 'milijun'
          singular: 'milijun'
          paucal: 'milijuna'
          plural: 'milijuna'
        -
          value: 1000
          gender: 'feminine'
          oneForm: 'tisuću'
          singular: 'tisuća'
          paucal: 'tisuće'
          plural: 'tisuća'

    formatting:
      negativeSign: '−'

    parse:
      engine: 'token-map'
      normalizationProfile: 'LowercaseRemovePeriods'
      cardinalMap:
        nula: 0
        jedan: 1
        jedna: 1
        jedno: 1
        dva: 2
        dvije: 2
        tri: 3
        'četiri': 4
        cetiri: 4
        pet: 5
        'šest': 6
        sest: 6
        sedam: 7
        osam: 8
        devet: 9
        deset: 10
        jedanaest: 11
        dvanaest: 12
        trinaest: 13
        'četrnaest': 14
        cetrnaest: 14
        petnaest: 15
        'šesnaest': 16
        sesnaest: 16
