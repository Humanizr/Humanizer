# Locale-owned generator data for hr.
# Omit a feature to inherit it from the parent locale.
# Inline mappings below are the source of truth for generated profiles and token-map lexicons.
collectionFormatter:
  engine: 'conjunction'
  value: 'i'
formatter:
  engine: 'profiled'
  resourceKeyDetector: 'south-slavic'
  resourceKeySuffixes:
    paucal: '_Paucal'
  dataUnitDetector: 'south-slavic'
  dataUnitSuffixes:
    singular: '_Singular'
    paucal: '_Paucal'
  dataUnitFallbackTransform: 'trim-trailing-s'
