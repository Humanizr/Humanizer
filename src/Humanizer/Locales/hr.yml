        milijardi: 1000000000
        bilijun: 1000000000000
        bilijuna: 1000000000000
        bilijarda: 1000000000000000
        bilijarde: 1000000000000000
        bilijardi: 1000000000000000
        trilijun: 1000000000000000000
        trilijuna: 1000000000000000000
      negativePrefixes:
        - 'minus '

  ordinal:
    numeric:
      engine: 'suffix'
      masculineSuffix: '.'

    date:
      engine: 'pattern'
      pattern: "{day} MMMM yyyy'.'"
      dayMode: 'DotSuffix'
    dateOnly:
      engine: 'pattern'
      pattern: "{day} MMMM yyyy'.'"
      dayMode: 'DotSuffix'

  clock:
    engine: 'phrase-clock'
    hourMode: 'h24'
    hourSuffixSingular: 'sat'
    hourSuffixPaucal: 'sata'
    hourSuffixPlural: 'sati'
    minuteSuffixSingular: 'minuta'
    minuteSuffixPaucal: 'minute'
    minuteSuffixPlural: 'minuta'
    min0: '{hour}'
    defaultTemplate: '{hour} i {minutes} {minuteSuffix}'

  compass:
    full:
      - 'sjever'
      - 'sjever-sjeveroistok'
      - 'sjeveroistok'
      - 'istok-sjeveroistok'
      - 'istok'
      - 'istok-jugoistok'
      - 'jugoistok'
      - 'jug-jugoistok'
      - 'jug'
      - 'jug-jugozapad'
      - 'jugozapad'
      - 'zapad-jugozapad'
      - 'zapad'
      - 'zapad-sjeverozapad'
      - 'sjeverozapad'
      - 'sjever-sjeverozapad'
