# Locale-owned generator data for he.
# Omit a feature to inherit it from the parent locale.
# Inline mappings below are the source of truth for generated profiles and token-map lexicons.
collectionFormatter:
  engine: 'clitic'
  value: 'ו'
formatter:
  engine: 'profiled'
  resourceKeyDetector: 'arabic-like'
  resourceKeySuffixes:
    dual: '_Dual'
    plural: '_Plural'
  dataUnitDetector: 'arabic-like'
  dataUnitSuffixes:
    singular: '_Singular'
    dual: '_Dual'
    plural: '_Plural'
  dataUnitFallbackTransform: 'trim-trailing-s'
numberToWords:
  engine: 'construct-state-scale'
  useCulture: true
  defaultGender: 'feminine'
  zeroWord: 'אפס'
  minusWord: 'מינוס'
  andPrefix: 'ו'
  teenMasculineWord: 'עשר'
  teenFeminineWord: 'עשרה'
  teenNormalizationOld: 'יי'
  teenNormalizationNew: 'י'
  unitsFeminine:
    - 'אפס'
    - 'אחת'
    - 'שתיים'
    - 'שלוש'
    - 'ארבע'
    - 'חמש'
    - 'שש'
    - 'שבע'
    - 'שמונה'
    - 'תשע'
    - 'עשר'
  unitsMasculine:
    - 'אפס'
    - 'אחד'
    - 'שניים'
    - 'שלושה'
    - 'ארבעה'
    - 'חמישה'
    - 'שישה'
    - 'שבעה'
    - 'שמונה'
    - 'תשעה'
    - 'עשרה'
  tensMap:
    - 'עשרים'
    - 'שלושים'
    - 'ארבעים'
    - 'חמישים'
    - 'שישים'
    - 'שבעים'
    - 'שמונים'
    - 'תשעים'
  oneHundredWord: 'מאה'
  twoHundredsWord: 'מאתיים'
  hundredsPluralSuffix: ' מאות'
  thousandsPluralSuffix: 'ת אלפים'
  thousandsSingularSuffix: ' אלף'
  thousandsSpecialCases:
    '1': 'אלף'
    '2': 'אלפיים'
    '8': 'שמונת אלפים'
  scales:
    -
      value: 1000000000
      singular: 'מיליארד'
      dualPrefix: 'שני'
      countGender: 'masculine'
    -
      value: 1000000
      singular: 'מיליון'
      dualPrefix: 'שני'
      countGender: 'masculine'
wordsToNumber:
  engine: 'token-map'
  normalizationProfile: 'punctuation-to-spaces-remove-diacritics'
  allowInvariantIntegerInput: true
  negativePrefixes:
    - 'מינוס '
    - 'שלילי '
  leadingTokenPrefixesToTrim:
    - 'ו'
  teenSuffixTokens:
    - 'עשר'
    - 'עשרה'
  hundredSuffixTokens:
    - 'מאות'
  hundredSuffixMinValue: 3
  hundredSuffixMaxValue: 9
  cardinalMap:
    'אפס': 0
    'אחת': 1
    'אחד': 1
    'שתיים': 2
    'שתים': 2
    'שניים': 2
    'שנים': 2
