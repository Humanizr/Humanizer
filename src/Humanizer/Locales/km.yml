            forms:
              default: 'សប្តាហ៍'
            template: '{count} {unit}មុន'
        month:
          single: '1 ខែមុន'
          multiple:
            forms:
              default: 'ខែ'
            template: '{count} {unit}មុន'
        year:
          single: '1 ឆ្នាំមុន'
          multiple:
            forms:
              default: 'ឆ្នាំ'
            template: '{count} {unit}មុន'
      future:
        millisecond:
          single: 'ក្នុង 1 មិល្លីវិនាទី'
          multiple:
            forms:
              default: 'មិល្លីវិនាទី'
            template: 'ក្នុង {count} {unit}'
        second:
