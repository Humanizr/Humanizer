# Khmer phrase review record (2026-05-14): the parity pass explicitly reviewed
# `phrases.relativeDate.never` and clock day-period/hour/minute keys
# (`clock.earlyMorning`, `clock.morning`, `clock.afternoon`, `clock.evening`,
# `clock.night`, `clock.hourSuffixSingular`, `clock.hourSuffixPlural`,
# `clock.minuteSuffixSingular`, `clock.minuteSuffixPlural`) and covers them with
# exact-output tests in KhmerLocaleParityTests.
