  ordinal:
    numeric:
      engine: 'template'
      masculine:
        prefix: 'ìkẹ-'
        defaultSuffix: ''
    date:
      pattern: '{day} MMMM yyyy'
      dayMode: 'Numeric'
    dateOnly:
      pattern: '{day} MMMM yyyy'
      dayMode: 'Numeric'

  clock:
