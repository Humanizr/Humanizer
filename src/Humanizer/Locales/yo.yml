locale: 'yo'

surfaces:
  list:
    engine: 'conjunction'
    value: 'àti'

  formatter:
    engine: 'profiled'
    pluralRule: 'singular-plural'
    dataUnitPluralRule: 'singular-plural'

  phrases:
    relativeDate:
      now: 'ní báyìí'
      never: 'rárá'
      past:
        millisecond:
          single: 'milisẹ́kọ́ńdì 1 sẹ́yìn'
          multiple:
            forms:
              default: 'milisẹ́kọ́ńdì'
            template: '{count} milisẹ́kọ́ńdì sẹ́yìn'
        second:
          single: 'ìṣẹ́jú-àáyá 1 sẹ́yìn'
          multiple:
            forms:
              default: 'ìṣẹ́jú-àáyá'
            template: '{count} ìṣẹ́jú-àáyá sẹ́yìn'
        minute:
          single: 'ìṣẹ́jú 1 sẹ́yìn'
          multiple:
            forms:
              default: 'ìṣẹ́jú'
            template: '{count} ìṣẹ́jú sẹ́yìn'
        hour:
          single: 'wákàtí 1 sẹ́yìn'
          multiple:
            forms:
              default: 'wákàtí'
            template: '{count} wákàtí sẹ́yìn'
        day:
          single: 'àná'
          multiple:
            forms:
              default: 'ọjọ́'
            template: '{count} ọjọ́ sẹ́yìn'
        week:
          single: 'ọ̀sẹ̀ 1 sẹ́yìn'
          multiple:
            forms:
              default: 'ọ̀sẹ̀'
            template: '{count} ọ̀sẹ̀ sẹ́yìn'
        month:
          single: 'oṣù 1 sẹ́yìn'
          multiple:
            forms:
              default: 'oṣù'
            template: '{count} oṣù sẹ́yìn'
        year:
          single: 'ọdún 1 sẹ́yìn'
          multiple:
            forms:
              default: 'ọdún'
            template: '{count} ọdún sẹ́yìn'
      future:
        millisecond:
          single: 'ní milisẹ́kọ́ńdì 1'
          multiple:
            forms:
              default: 'milisẹ́kọ́ńdì'
            template: 'ní milisẹ́kọ́ńdì {count}'
        second:
          single: 'ní ìṣẹ́jú-àáyá 1'
          multiple:
            forms:
              default: 'ìṣẹ́jú-àáyá'
            template: 'ní ìṣẹ́jú-àáyá {count}'
        minute:
          single: 'ní ìṣẹ́jú 1'
          multiple:
            forms:
              default: 'ìṣẹ́jú'
            template: 'ní ìṣẹ́jú {count}'
        hour:
          single: 'ní wákàtí 1'
          multiple:
            forms:
              default: 'wákàtí'
            template: 'ní wákàtí {count}'
        day:
          single: 'ọ̀la'
          multiple:
            forms:
              default: 'ọjọ́'
            template: 'ní ọjọ́ {count}'
        week:
          single: 'ní ọ̀sẹ̀ 1'
          multiple:
            forms:
              default: 'ọ̀sẹ̀'
            template: 'ní ọ̀sẹ̀ {count}'
        month:
          single: 'ní oṣù 1'
          multiple:
            forms:
              default: 'oṣù'
            template: 'ní oṣù {count}'
        year:
          single: 'ní ọdún 1'
          multiple:
            forms:
              default: 'ọdún'
            template: 'ní ọdún {count}'
    duration:
      zero: 'kò sí àkókò'
      age:
        template: '{value}'
      millisecond:
        single:
          numeric: 'milisẹ́kọ́ńdì 1'
          words: 'milisẹ́kọ́ńdì kan'
        multiple:
          countPlacement: 'after-form'
          forms:
            default: 'milisẹ́kọ́ńdì'
      second:
        single:
          numeric: 'ìṣẹ́jú-àáyá 1'
          words: 'ìṣẹ́jú-àáyá kan'
        multiple:
          countPlacement: 'after-form'
          forms:
            default: 'ìṣẹ́jú-àáyá'
      minute:
        single:
          numeric: 'ìṣẹ́jú 1'
          words: 'ìṣẹ́jú kan'
        multiple:
          countPlacement: 'after-form'
          forms:
            default: 'ìṣẹ́jú'
      hour:
        single:
          numeric: 'wákàtí 1'
          words: 'wákàtí kan'
        multiple:
          countPlacement: 'after-form'
          forms:
            default: 'wákàtí'
      day:
        single:
          numeric: 'ọjọ́ 1'
          words: 'ọjọ́ kan'
        multiple:
          countPlacement: 'after-form'
          forms:
            default: 'ọjọ́'
      week:
        single:
          numeric: 'ọ̀sẹ̀ 1'
          words: 'ọ̀sẹ̀ kan'
        multiple:
          countPlacement: 'after-form'
          forms:
            default: 'ọ̀sẹ̀'
      month:
        single:
          numeric: 'oṣù 1'
          words: 'oṣù kan'
        multiple:
          countPlacement: 'after-form'
          forms:
            default: 'oṣù'
      year:
        single:
          numeric: 'ọdún 1'
          words: 'ọdún kan'
        multiple:
          countPlacement: 'after-form'
          forms:
            default: 'ọdún'
    dataUnits:
      bit:
        forms:
          default: 'bítì'
        symbol: 'b'
      byte:
        forms:
          default: 'báìtì'
        symbol: 'B'
      kilobyte:
        forms:
          default: 'kílóbáìtì'
        symbol: 'KB'
      megabyte:
        forms:
          default: 'mẹ́gábáìtì'
        symbol: 'MB'
      gigabyte:
        forms:
          default: 'gígábáìtì'
        symbol: 'GB'
      terabyte:
        forms:
          default: 'tẹ́rábáìtì'
        symbol: 'TB'
    timeUnits:
      millisecond:
        symbol: 'ms'
      second:
        symbol: 's'
      minute:
        symbol: 'min'
      hour:
        symbol: 'h'
      day:
        symbol: 'ọj'
      week:
        symbol: 'ọ̀s'
      month:
        symbol: 'oṣ'
      year:
        symbol: 'ọd'

