## flow-next project configuration
## Docs: https://github.com/ryanwolhuter/flow-next

project:
  name: Humanizer
  description: ".NET library for turning numbers, dates, times, enums, quantities into human-friendly text across many locales"

repo:
  main_branch: main
  default_base: main

conventions:
  branch_prefix: "flow/"
  commit_style: conventional  # conventional | freeform
  pr_template: true

quality:
  require_tests: true
  require_build: true
  build_command: "dotnet pack src/Humanizer/Humanizer.csproj -c Release -o artifacts"
  test_command: "dotnet test tests/Humanizer.Tests/Humanizer.Tests.csproj --framework net10.0"
