# Fixture: exercises NumberToWordsEngineContractFactory GetStringValue fallback-source-path branch
# inverted-tens has unitTensAlternateJoiner with fallbackSourcePath="unitTensJoiner".
# When unitTensAlternateJoiner is omitted but unitTensJoiner is present, the factory
# falls back to unitTensJoiner's value.
locale: 'zz-n2w-inverted-fallback'
surfaces:
  number:
    words:
      engine: 'inverted-tens'
      minusWord: 'minus'
      unitsMap:
        - 'null'
        - 'eins'
        - 'zwei'
        - 'drei'
        - 'vier'
        - 'fuenf'
        - 'sechs'
        - 'sieben'
        - 'acht'
        - 'neun'
        - 'zehn'
        - 'elf'
        - 'zwoelf'
        - 'dreizehn'
        - 'vierzehn'
        - 'fuenfzehn'
        - 'sechzehn'
        - 'siebzehn'
        - 'achtzehn'
        - 'neunzehn'
      tensMap:
        1: 'zehn'
        2: 'zwanzig'
        3: 'dreissig'
      hundredsPrefixMap:
        1: 'ein'
        2: 'zwei'
      oneHundredWord: 'einhundert'
      hundredWord: 'hundert'
      unitTensJoiner: 'und'
      scales:
        -
          value: 1000
          oneForm: 'eintausend'
          manyForm: 'tausend'
          countJoiner: ''
          remainderSeparator: ''
